<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROZEN FILM · 업무 시스템</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Noto Sans KR', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    .hidden { display: none !important; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1A365D 0%, #2B6CB0 60%, #2C7A7B 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
    }

    .logo-area { text-align: center; margin-bottom: 48px; }
    .logo-area p.brand {
      font-size: 36px; font-weight: 800; color: #fff;
      letter-spacing: -1px; margin-bottom: 6px;
    }
    .logo-area p.sub {
      font-size: 14px; color: rgba(255,255,255,.6);
      letter-spacing: .06em;
    }

    .cards {
      display: flex; gap: 20px; flex-wrap: wrap;
      justify-content: center; width: 100%; max-width: 640px;
    }

    .app-card {
      flex: 1; min-width: 240px; max-width: 300px;
      background: rgba(255,255,255,.1);
      border: 1.5px solid rgba(255,255,255,.2);
      border-radius: 20px;
      padding: 32px 28px;
      text-decoration: none;
      color: #fff;
      transition: transform .15s, background .15s, box-shadow .15s;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }
    .app-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,.18);
      box-shadow: 0 16px 40px rgba(0,0,0,.25);
    }

    .app-card .icon {
      font-size: 48px; margin-bottom: 16px; display: block;
    }
    .app-card .title {
      font-size: 20px; font-weight: 800; margin-bottom: 8px;
    }
    .app-card .desc {
      font-size: 13px; color: rgba(255,255,255,.7); line-height: 1.7;
    }
    .app-card .arrow {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 20px; font-size: 13px; font-weight: 700;
      color: rgba(255,255,255,.9);
      background: rgba(255,255,255,.15);
      padding: 7px 14px; border-radius: 8px;
    }

    .app-card.admin .arrow { background: rgba(255,255,255,.2); }

    .footer {
      margin-top: 40px;
      font-size: 12px; color: rgba(255,255,255,.35);
      text-align: center;
    }
  </style>

</head>
