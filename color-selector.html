<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROZEN FILM · 필름 색상 선택 도우미</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
  * { font-family: 'Noto Sans KR', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
  .hidden { display: none !important; }

  :root {
    --bg: #F0F4F8;
    --surface: #FFFFFF;
    --border: #E2E8F0;
    --text: #1A202C;
    --muted: #718096;
    --brand: #2B6CB0;
    --brand-light: #EBF8FF;
    --accent: #38A169;
  }

  body { background: var(--bg); color: var(--text); min-height: 100vh; }

  .wrap { max-width: 560px; margin: 0 auto; padding: 20px; padding-bottom: 60px; }

  .header { text-align: center; padding: 20px 0 24px; }
  .header .logo { font-size: 20px; font-weight: 800; color: var(--brand); }
  .header .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .step {
    background: var(--surface); border-radius: 16px; padding: 28px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
  }
  .step-label { font-size: 12px; font-weight: 700; color: var(--brand); letter-spacing: .04em; margin-bottom: 8px; }
  .step-question { font-size: 20px; font-weight: 800; line-height: 1.4; margin-bottom: 8px; }
  .step-hint { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

  /* HOME - category cards */
  .cat-list { display: flex; flex-direction: column; gap: 12px; }
  .cat-card {
    display: flex; align-items: center; gap: 14px;
    border: 1.5px solid var(--border); border-radius: 14px; background: #fff;
    padding: 16px 18px; cursor: pointer; text-align: left; width: 100%;
    transition: all .15s;
  }
  .cat-card:active { transform: scale(.98); }
  .cat-card:hover { border-color: var(--brand); background: var(--brand-light); }
  .cat-emoji {
    width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    background: var(--bg);
  }
  .cat-body { flex: 1; min-width: 0; }
  .cat-title { font-size: 15.5px; font-weight: 800; margin-bottom: 2px; }
  .cat-desc { font-size: 12.5px; color: var(--muted); line-height: 1.5; }
  .cat-arrow { color: var(--muted); font-size: 18px; flex-shrink: 0; }

  /* SUB HEADER for non-home screens */
  .sub-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .back-btn {
    width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--border);
    background: #fff; color: var(--brand); font-size: 16px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
  }
  .back-btn:active { background: var(--brand-light); }
  .sub-head-title { font-size: 16px; font-weight: 800; }
  .sub-head-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* SAMPLE GRID */
  .sample-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .sample-card {
    background: #fff; border: 1.5px solid var(--border); border-radius: 14px;
    overflow: hidden; cursor: pointer; transition: all .15s;
  }
  .sample-card:active { transform: scale(.97); }
  .sample-card:hover { border-color: var(--brand); }
  .sample-thumb { width: 100%; aspect-ratio: 1/1; background: var(--bg); object-fit: cover; display: block; }
  .sample-info { padding: 10px 12px 12px; }
  .sample-name { font-size: 13.5px; font-weight: 700; margin-bottom: 2px; }
  .sample-code { font-size: 11px; color: var(--brand); font-weight: 600; }

  .state-box { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 13.5px; line-height: 1.7; }
  .state-box .big { font-size: 30px; margin-bottom: 10px; display: block; }
  .spinner {
    width: 24px; height: 24px; border-radius: 50%; border: 2.5px solid var(--border);
    border-top-color: var(--brand); margin: 0 auto 14px; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* DETAIL */
  .detail-hero {
    width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block;
    border-radius: 14px; background: var(--bg); margin-bottom: 18px;
  }
  .detail-title { font-size: 19px; font-weight: 800; margin-bottom: 4px; }
  .detail-code { font-size: 12.5px; color: var(--brand); font-weight: 700; margin-bottom: 18px; }
  .filmstrip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 20px; }
  .filmstrip img {
    width: 60px; height: 60px; object-fit: cover; border-radius: 10px; flex-shrink: 0;
    border: 2px solid var(--border); cursor: pointer; opacity: .75; transition: all .15s;
  }
  .filmstrip img.active { opacity: 1; border-color: var(--brand); }
  .section-label {
    font-size: 12px; font-weight: 700; color: var(--brand); letter-spacing: .02em; margin-bottom: 10px;
  }
  .case-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .case-link {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    background: var(--brand-light); border: 1.5px solid #BFDBFE; border-radius: 12px;
    padding: 13px 14px; text-decoration: none; color: var(--text); font-size: 13.5px; font-weight: 700;
  }
  .case-link .arrow { color: var(--brand); font-size: 15px; flex-shrink: 0; }

  .final-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .final-btn {
    padding: 16px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    text-decoration: none;
  }
  .final-btn.go { background: var(--brand); color: #fff; }
  .final-btn.kakao { background: #FEE500; color: #191919; }

  footer { text-align: center; padding: 18px 0 0; }
  footer p { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>
<div class="wrap" id="app">

  <div class="header">
    <div class="logo">🎨 ROZEN FILM</div>
    <div class="sub">필름 색상 선택 도우미</div>
  </div>

  <div id="screen-home" class="screen">
    <div class="step">
      <div class="step-label">START</div>
      <div class="step-question">어떤 분위기의<br>인테리어를 찾고 계세요?</div>
      <div class="step-hint">원하시는 항목을 선택하시면 어울리는 필름 샘플과 실제 시공사례를 보여드려요.</div>
      <div class="cat-list">
        <button class="cat-card" data-goto="samples" data-category="white">
          <div class="cat-emoji">🤍</div>
          <div class="cat-body">
            <div class="cat-title">화이트톤 인테리어</div>
            <div class="cat-desc">깨끗하고 밝은 화이트 계열의 공간</div>
          </div>
          <div class="cat-arrow">›</div>
        </button>
        <button class="cat-card" data-goto="samples" data-category="wood">
          <div class="cat-emoji">🪵</div>
          <div class="cat-body">
            <div class="cat-title">우드톤 인테리어</div>
            <div class="cat-desc">따뜻한 원목 질감의 우드 계열</div>
          </div>
          <div class="cat-arrow">›</div>
        </button>
        <button class="cat-card" data-goto="samples" data-category="colorful">
          <div class="cat-emoji">🎨</div>
          <div class="cat-body">
            <div class="cat-title">컬러풀한 인테리어</div>
            <div class="cat-desc">개성있는 컬러 포인트가 있는 공간</div>
          </div>
          <div class="cat-arrow">›</div>
        </button>
        <button class="cat-card" data-goto="samples" data-category="gray">
          <div class="cat-emoji">🩶</div>
          <div class="cat-body">
            <div class="cat-title">모던한 그레이톤</div>
            <div class="cat-desc">세련되고 차분한 그레이 계열의 공간</div>
          </div>
          <div class="cat-arrow">›</div>
        </button>
        <button class="cat-card" data-goto="samples" data-category="beige">
          <div class="cat-emoji">🟤</div>
          <div class="cat-body">
            <div class="cat-title">따뜻한 베이지톤</div>
            <div class="cat-desc">포근하고 안정적인 베이지 계열의 공간</div>
          </div>
          <div class="cat-arrow">›</div>
        </button>
        <button class="cat-card" data-goto="contact" data-contact="match">
          <div class="cat-emoji">🔍</div>
          <div class="cat-body">
            <div class="cat-title">기존 컬러와 유사하게</div>
            <div class="cat-desc">지금 있는 컬러와 최대한 비슷하게 맞추고 싶어요</div>
          </div>
          <div class="cat-arrow">›</div>
        </button>
        <button class="cat-card" data-goto="contact" data-contact="assigned">
          <div class="cat-emoji">🏷️</div>
          <div class="cat-body">
            <div class="cat-title">지정해둔 필름이 있어요</div>
            <div class="cat-desc">원하는 필름 코드나 제품이 정해져 있어요</div>
          </div>
          <div class="cat-arrow">›</div>
        </button>
      </div>
    </div>
  </div>

  <div id="screen-samples" class="screen hidden">
    <div class="sub-head">
      <button class="back-btn" data-goto="home">‹</button>
      <div>
        <div class="sub-head-title" id="samples-title">샘플</div>
        <div class="sub-head-sub">마음에 드는 샘플을 눌러 시공사례를 확인하세요</div>
      </div>
    </div>
    <div class="step">
      <div class="sample-grid" id="sample-grid"></div>
    </div>
  </div>

  <div id="screen-detail" class="screen hidden">
    <div class="sub-head">
      <button class="back-btn" data-goto="samples">‹</button>
      <div>
        <div class="sub-head-title">샘플 상세</div>
        <div class="sub-head-sub">시공 사진과 사례를 확인해보세요</div>
      </div>
    </div>
    <div class="step" id="screen-detail-body"></div>
  </div>

  <div id="screen-contact" class="screen hidden">
    <div class="sub-head">
      <button class="back-btn" data-goto="home">‹</button>
      <div class="sub-head-title">상담 문의</div>
    </div>
    <div class="step" id="screen-contact-body"></div>
  </div>

  <footer><p>ⓒ Rozenfilm · 010-4729-4911</p></footer>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyD1Nqi0J2ust7UTo6XQOLofZobOHS2O7dU",
    authDomain: "rozenfilm-estimate.firebaseapp.com",
    projectId: "rozenfilm-estimate",
    storageBucket: "rozenfilm-estimate.firebasestorage.app",
    messagingSenderId: "205994221853",
    appId: "1:205994221853:web:66cf3b8f7e90f9672581f4"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const CATEGORIES = {
    white:    { label: '화이트톤 인테리어' },
    wood:     { label: '우드톤 인테리어' },
    colorful: { label: '컬러풀한 인테리어' },
    gray:     { label: '모던한 그레이톤' },
    beige:    { label: '따뜻한 베이지톤' }
  };

  const CONTACT_COPY = {
    match: {
      icon: '🔍',
      title: '기존 컬러와 유사하게',
      body: '지금 사용 중인 컬러 사진을 보내주시면, 가장 비슷한 필름을 찾아서 추천해드려요. 전화나 카카오톡으로 사진과 함께 문의해주세요.'
    },
    assigned: {
      icon: '🏷️',
      title: '지정해둔 필름이 있어요',
      body: '원하시는 필름 코드나 제품명을 알려주시면 바로 견적 상담을 도와드려요. 전화나 카카오톡으로 편하게 문의해주세요.'
    }
  };

  const PHONE = '010-4729-4911';
  const KAKAO_LINK = 'https://open.kakao.com/o/sVVaN3J';

  let currentCategory = null;
  let currentSamples = [];

  function showScreen(id){
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById('screen-' + id).classList.remove('hidden');
    window.scrollTo(0,0);
  }

  document.addEventListener('click', (e) => {
    const el = e.target.closest('[data-goto]');
    if(!el) return;
    const goto = el.dataset.goto;
    if(goto === 'samples' && el.dataset.category){
      openCategory(el.dataset.category);
    } else if(goto === 'contact' && el.dataset.contact){
      openContact(el.dataset.contact);
    } else {
      showScreen(goto);
    }
  });

  async function openCategory(category){
    currentCategory = category;
    document.getElementById('samples-title').textContent = CATEGORIES[category].label;
    showScreen('samples');
    const grid = document.getElementById('sample-grid');
    grid.innerHTML = '<div class="state-box" style="grid-column:1/-1;"><div class="spinner"></div>샘플을 불러오는 중이에요</div>';

    try{
      const snap = await db.collection('film_samples')
        .where('category', '==', category)
        .orderBy('createdAt', 'asc')
        .get();

      if(snap.empty){
        grid.innerHTML = `<div class="state-box" style="grid-column:1/-1;">
          <span class="big">🎞️</span>
          아직 등록된 샘플이 없어요.<br>전화나 카카오톡으로 문의해주시면<br>바로 추천해드릴게요.
        </div>`;
        currentSamples = [];
        return;
      }

      currentSamples = [];
      grid.innerHTML = '';
      snap.forEach(doc => {
        const data = doc.data();
        currentSamples.push({ id: doc.id, ...data });
        const card = document.createElement('div');
        card.className = 'sample-card';
        card.innerHTML = `
          <img class="sample-thumb" src="${escapeAttr(data.sampleImageUrl || '')}" alt="${escapeAttr(data.name || '')}" loading="lazy" />
          <div class="sample-info">
            <div class="sample-name">${escapeHtml(data.name || '이름 없음')}</div>
            ${data.code ? `<div class="sample-code">${escapeHtml(data.code)}</div>` : ''}
          </div>`;
        card.addEventListener('click', () => openDetail(doc.id));
        grid.appendChild(card);
      });
    }catch(err){
      console.error(err);
      grid.innerHTML = '<div class="state-box" style="grid-column:1/-1;">샘플을 불러오지 못했어요.<br>잠시 후 다시 시도해주세요.</div>';
    }
  }

  function openDetail(id){
    const sample = currentSamples.find(s => s.id === id);
    if(!sample) return;
    showScreen('detail');
    const body = document.getElementById('screen-detail-body');

    const installImages = Array.isArray(sample.installImages) ? sample.installImages.filter(Boolean) : [];
    const caseLinks = Array.isArray(sample.caseLinks) ? sample.caseLinks.filter(c => c && c.url) : [];
    const heroSrc = installImages[0] || sample.sampleImageUrl || '';

    body.innerHTML = `
      <img class="detail-hero" id="detail-hero-img" src="${escapeAttr(heroSrc)}" alt="${escapeAttr(sample.name || '')}" />
      <div class="detail-title">${escapeHtml(sample.name || '이름 없음')}</div>
      ${sample.code ? `<div class="detail-code">${escapeHtml(sample.code)}</div>` : '<div style="margin-bottom:18px"></div>'}

      ${installImages.length ? `
      <div class="section-label">📷 시공 사진</div>
      <div class="filmstrip" id="filmstrip"></div>` : ''}

      ${caseLinks.length ? `
      <div class="section-label">🏠 시공 사례</div>
      <div class="case-list" id="case-list"></div>` : `
      <div class="state-box" style="padding:14px 0 20px;">등록된 시공사례 링크가 아직 없어요.</div>`}

      <div class="final-actions">
        <a class="final-btn go" href="tel:${PHONE}">📞 전화로 상담하기</a>
        <a class="final-btn kakao" href="${KAKAO_LINK}" target="_blank" rel="noopener">💬 카카오톡으로 문의하기</a>
      </div>
    `;

    if(installImages.length){
      const strip = document.getElementById('filmstrip');
      installImages.forEach((url) => {
        const img = document.createElement('img');
        img.src = url;
        img.loading = 'lazy';
        if(url === heroSrc) img.classList.add('active');
        img.addEventListener('click', () => {
          document.getElementById('detail-hero-img').src = url;
          strip.querySelectorAll('img').forEach(im => im.classList.remove('active'));
          img.classList.add('active');
        });
        strip.appendChild(img);
      });
    }

    if(caseLinks.length){
      const list = document.getElementById('case-list');
      caseLinks.forEach(c => {
        const a = document.createElement('a');
        a.className = 'case-link';
        a.href = c.url;
        a.target = '_blank';
        a.rel = 'noopener';
        a.innerHTML = `<span>${escapeHtml(c.title || '시공 사례 보기')}</span><span class="arrow">↗</span>`;
        list.appendChild(a);
      });
    }
  }

  function openContact(kind){
    const copy = CONTACT_COPY[kind];
    showScreen('contact');
    const body = document.getElementById('screen-contact-body');
    body.innerHTML = `
      <div class="cat-emoji" style="width:52px;height:52px;font-size:24px;margin-bottom:16px;">${copy.icon}</div>
      <div class="step-question" style="margin-bottom:8px;">${escapeHtml(copy.title)}</div>
      <div class="step-hint" style="margin-bottom:24px;">${escapeHtml(copy.body)}</div>
      <div class="final-actions">
        <a class="final-btn go" href="tel:${PHONE}">📞 전화로 상담하기</a>
        <a class="final-btn kakao" href="${KAKAO_LINK}" target="_blank" rel="noopener">💬 카카오톡으로 문의하기</a>
      </div>
    `;
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
  function escapeAttr(str){ return escapeHtml(str); }

  showScreen('home');
</script>
</body>
</html>
