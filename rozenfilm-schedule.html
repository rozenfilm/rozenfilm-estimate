<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROZEN FILM · 시공팀 일정</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Noto Sans KR', sans-serif; box-sizing: border-box; }

    :root {
      --bg: #F0F4F8;
      --surface: #FFFFFF;
      --border: #E2E8F0;
      --text: #1A202C;
      --muted: #718096;
      --brand: #2B6CB0;
      --brand-light: #EBF8FF;
      --accent: #38A169;
    }

    body { background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Calendar grid */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .cal-day {
      background: var(--surface);
      border-radius: 8px;
      min-height: 90px;
      padding: 6px;
      cursor: pointer;
      transition: box-shadow .12s;
      border: 2px solid transparent;
    }
    .cal-day:hover { box-shadow: 0 0 0 2px var(--brand); }
    .cal-day.today { border-color: var(--brand); }
    .cal-day.other-month { background: #F7FAFC; opacity: .6; }
    .cal-day-num {
      font-size: 13px; font-weight: 700;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .cal-day.today .cal-day-num { color: var(--brand); }
    .cal-day.sunday .cal-day-num { color: #E53E3E; }
    .cal-day.saturday .cal-day-num { color: #3182CE; }

    /* Schedule chips */
    .chip {
      display: flex; align-items: center; gap: 3px;
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 10px; font-weight: 600;
      margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 100%;
      cursor: pointer;
    }
    .chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* Session badges */
    .session-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 700;
      padding: 1px 5px; border-radius: 3px;
    }
    .session-am   { background: #FEFCBF; color: #975A16; }
    .session-pm   { background: #C6F6D5; color: #276749; }
    .session-full { background: #BEE3F8; color: #2C5282; }

    /* Sidebar */
    .sidebar { width: 280px; flex-shrink: 0; }

    /* Worker list */
    .worker-row {
      display: flex; align-items: center; gap-8px;
      padding: 8px 10px; border-radius: 8px;
      cursor: pointer; transition: background .1s;
    }
    .worker-row:hover { background: var(--bg); }
    .worker-row.inactive { opacity: .4; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,.5); backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .modal {
      background: var(--surface); border-radius: 16px;
      width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }

    /* Buttons */
    .btn-primary {
      background: var(--brand); color: #fff;
      border: none; border-radius: 8px;
      padding: 10px 20px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .1s;
    }
    .btn-primary:hover { background: #2C5282; }
    .btn-secondary {
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 8px; padding: 8px 16px;
      font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .btn-danger {
      background: #FFF5F5; color: #C53030;
      border: 1.5px solid #FED7D7;
      border-radius: 8px; padding: 8px 16px;
      font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .input {
      border: 1.5px solid var(--border); border-radius: 8px;
      padding: 8px 12px; font-size: 14px; outline: none; width: 100%;
      color: var(--text); background: var(--surface);
      transition: border-color .1s;
    }
    .input:focus { border-color: var(--brand); }

    .session-btn {
      flex: 1; padding: 10px 8px; border-radius: 8px;
      border: 2px solid var(--border); background: var(--bg);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all .12s; text-align: center;
    }
    .session-btn.active-am   { border-color: #D69E2E; background: #FEFCBF; color: #975A16; }
    .session-btn.active-pm   { border-color: #38A169; background: #C6F6D5; color: #276749; }
    .session-btn.active-full { border-color: #3182CE; background: #BEE3F8; color: #2C5282; }

    /* Legend & nav */
    .nav-btn {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 6px 14px; font-size: 14px;
      font-weight: 600; cursor: pointer; color: var(--text);
    }
    .nav-btn:hover { background: var(--brand-light); border-color: var(--brand); }

    /* Availability summary row */
    .avail-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-radius: 8px; margin-bottom: 4px;
      background: var(--bg);
    }

    /* Tag */
    .tag { display: inline-flex; align-items: center; padding: 2px 8px;
      border-radius: 20px; font-size: 11px; font-weight: 700; }

    /* Stats */
    .stat-card { background: var(--surface); border-radius: 12px;
      padding: 16px; border: 1px solid var(--border); }

    @media (max-width: 768px) {
      .sidebar { width: 100%; }
      .cal-day { min-height: 60px; padding: 4px; }
      .chip { font-size: 9px; }
    }
  </style>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, updateDoc, query, orderBy }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD1Nqi0J2ust7UTo6XQOLofZobOHS2O7dU",
      authDomain: "rozenfilm-estimate.firebaseapp.com",
      projectId: "rozenfilm-estimate",
      storageBucket: "rozenfilm-estimate.firebasestorage.app",
      messagingSenderId: "205994221853",
      appId: "1:205994221853:web:66cf3b8f7e90f9672581f4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window._auth = auth;
    window._db = db;
    window._fbFns = { signInWithEmailAndPassword, signOut, onAuthStateChanged,
      collection, doc, setDoc, getDocs, deleteDoc, updateDoc, query, orderBy };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        window._user = user;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        await loadWorkers();
        await loadSchedules();
        renderCalendar();
        renderWorkerList();
      } else {
        window._user = null;
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('appScreen').classList.add('hidden');
      }
    });
  </script>
</head>
<body>

<!-- ─── LOGIN ─── -->
<div id="loginScreen" class="fixed inset-0 flex items-center justify-center z-50"
  style="background:linear-gradient(135deg,#1A365D 0%,#2B6CB0 100%)">
  <div style="background:#fff;border-radius:20px;padding:40px;width:360px;max-width:90vw;box-shadow:0 24px 64px rgba(0,0,0,.3)">
    <div class="text-center mb-8">
      <p style="font-size:26px;font-weight:800;color:#2B6CB0;letter-spacing:-.5px">🏠 ROZEN FILM</p>
      <p style="font-size:13px;color:#718096;margin-top:4px">시공팀 일정 관리 시스템</p>
    </div>
    <div class="space-y-3">
      <input type="email" id="loginEmail" class="input" placeholder="이메일">
      <input type="password" id="loginPassword" class="input" placeholder="비밀번호"
        onkeydown="if(event.key==='Enter')doLogin()">
      <p id="loginErr" class="text-xs hidden" style="color:#E53E3E">이메일 또는 비밀번호가 올바르지 않습니다.</p>
      <button onclick="doLogin()" class="btn-primary w-full" style="padding:12px;font-size:15px">로그인</button>
    </div>
  </div>
</div>

<!-- ─── APP ─── -->
<div id="appScreen" class="hidden">

  <!-- Top Nav -->
  <div style="background:#1A365D;color:#fff;padding:12px 20px" class="flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span style="font-size:18px;font-weight:800;letter-spacing:-.5px">🏠 ROZEN FILM</span>
      <span style="font-size:12px;opacity:.6;margin-top:1px">시공팀 일정</span>
    </div>
    <div class="flex items-center gap-3">
      <!-- Tab buttons -->
      <div style="background:rgba(255,255,255,.1);border-radius:8px;padding:3px;display:flex;gap:2px">
        <button onclick="switchTab('calendar')" id="tab-calendar"
          class="tab-btn active" style="padding:5px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:#fff;background:rgba(255,255,255,.2)">
          📅 캘린더
        </button>
        <button onclick="switchTab('stats')" id="tab-stats"
          class="tab-btn" style="padding:5px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.6);background:transparent">
          📊 통계
        </button>
        <button onclick="switchTab('workers')" id="tab-workers"
          class="tab-btn" style="padding:5px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.6);background:transparent">
          👷 팀원
        </button>
      </div>
      <button onclick="doLogout()" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer">로그아웃</button>
    </div>
  </div>

  <!-- ─── CALENDAR TAB ─── -->
  <div id="view-calendar" class="p-4" style="max-width:1200px;margin:0 auto">
    <div class="flex gap-4 flex-wrap lg:flex-nowrap">

      <!-- Calendar main -->
      <div class="flex-1 min-w-0">
        <!-- Month nav -->
        <div class="flex items-center justify-between mb-4">
          <button onclick="changeMonth(-1)" class="nav-btn">◀</button>
          <h2 id="calTitle" style="font-size:20px;font-weight:800"></h2>
          <button onclick="changeMonth(1)" class="nav-btn">▶</button>
        </div>

        <!-- Day headers -->
        <div class="cal-grid mb-1">
          <div class="text-center text-xs font-bold py-1" style="color:#E53E3E">일</div>
          <div class="text-center text-xs font-bold py-1" style="color:#4A5568">월</div>
          <div class="text-center text-xs font-bold py-1" style="color:#4A5568">화</div>
          <div class="text-center text-xs font-bold py-1" style="color:#4A5568">수</div>
          <div class="text-center text-xs font-bold py-1" style="color:#4A5568">목</div>
          <div class="text-center text-xs font-bold py-1" style="color:#4A5568">금</div>
          <div class="text-center text-xs font-bold py-1" style="color:#3182CE">토</div>
        </div>

        <div id="calGrid" class="cal-grid gap-1"></div>

        <!-- Legend -->
        <div class="flex flex-wrap gap-3 mt-3" style="font-size:11px;color:#718096">
          <span class="session-badge session-am">오전</span>
          <span class="session-badge session-pm">오후</span>
          <span class="session-badge session-full">종일</span>
          <span style="margin-left:8px">클릭 → 일정 추가/확인</span>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="sidebar">
        <!-- Worker filter -->
        <div style="background:#fff;border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:12px">
          <div class="flex items-center justify-between mb-2">
            <p style="font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.06em">팀원 필터</p>
            <button onclick="toggleAllWorkers()" style="font-size:11px;color:var(--brand);cursor:pointer;background:none;border:none;font-weight:600">전체 토글</button>
          </div>
          <div id="workerFilterList" class="space-y-1"></div>
        </div>

        <!-- Today availability -->
        <div style="background:#fff;border-radius:12px;border:1px solid var(--border);padding:14px">
          <p style="font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.06em;margin-bottom:10px">오늘 가용 현황</p>
          <div id="todayAvailability"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── STATS TAB ─── -->
  <div id="view-stats" class="hidden p-4" style="max-width:900px;margin:0 auto">
    <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
      <h2 style="font-size:20px;font-weight:800">📊 월별 근무 통계</h2>
      <div class="flex items-center gap-2">
        <button onclick="changeStatsMonth(-1)" class="nav-btn">◀</button>
        <span id="statsMonthTitle" style="font-size:16px;font-weight:700;min-width:100px;text-align:center"></span>
        <button onclick="changeStatsMonth(1)" class="nav-btn">▶</button>
      </div>
    </div>
    <div id="statsGrid" class="grid gap-3" style="grid-template-columns:repeat(auto-fill,minmax(200px,1fr))"></div>
    <div id="statsDetail" class="mt-4"></div>
  </div>

  <!-- ─── WORKERS TAB ─── -->
  <div id="view-workers" class="hidden p-4" style="max-width:700px;margin:0 auto">
    <div class="flex items-center justify-between mb-4">
      <h2 style="font-size:20px;font-weight:800">👷 팀원 관리</h2>
      <button onclick="openAddWorkerModal()" class="btn-primary">+ 팀원 추가</button>
    </div>
    <div id="workerManageList" class="space-y-2"></div>
  </div>

</div>

<!-- ─── DAY DETAIL MODAL ─── -->
<div id="dayModal" class="modal-overlay hidden" onclick="if(event.target===this)closeDayModal()">
  <div class="modal">
    <div style="padding:20px 24px;border-bottom:1px solid var(--border)">
      <div class="flex items-center justify-between">
        <h3 id="modalDateTitle" style="font-size:17px;font-weight:800"></h3>
        <button onclick="closeDayModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)">✕</button>
      </div>
    </div>

    <!-- Existing schedules for the day -->
    <div style="padding:16px 24px;border-bottom:1px solid var(--border)">
      <p style="font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.06em;margin-bottom:10px">이 날의 일정</p>
      <div id="dayScheduleList"></div>
    </div>

    <!-- Add new schedule -->
    <div style="padding:16px 24px">
      <p style="font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.06em;margin-bottom:12px">일정 추가</p>
      <div class="space-y-3">
        <div>
          <label style="font-size:12px;font-weight:600;color:var(--muted)">시공자 선택</label>
          <select id="scheduleWorker" class="input mt-1">
            <option value="">선택...</option>
          </select>
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;color:var(--muted)">근무 시간</label>
          <div class="flex gap-2 mt-1">
            <button class="session-btn" id="btn-am" onclick="selectSession('am')">🌅 오전</button>
            <button class="session-btn" id="btn-pm" onclick="selectSession('pm')">🌇 오후</button>
            <button class="session-btn" id="btn-full" onclick="selectSession('full')">☀️ 종일</button>
          </div>
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;color:var(--muted)">현장명</label>
          <input type="text" id="scheduleLocation" class="input mt-1" placeholder="예: 강남구 대치동 은마아파트">
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;color:var(--muted)">메모 (선택)</label>
          <input type="text" id="scheduleMemo" class="input mt-1" placeholder="예: 문짝 5개, 오전만 가능">
        </div>
        <div class="flex gap-2 pt-2">
          <button onclick="addSchedule()" class="btn-primary flex-1">일정 추가</button>
          <button onclick="shareKakao()" style="background:#FEE500;color:#3A1D1D;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer">카카오 공유</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ─── ADD WORKER MODAL ─── -->
<div id="workerModal" class="modal-overlay hidden" onclick="if(event.target===this)closeWorkerModal()">
  <div class="modal" style="max-width:400px">
    <div style="padding:20px 24px;border-bottom:1px solid var(--border)">
      <div class="flex items-center justify-between">
        <h3 id="workerModalTitle" style="font-size:17px;font-weight:800">팀원 추가</h3>
        <button onclick="closeWorkerModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)">✕</button>
      </div>
    </div>
    <div style="padding:20px 24px" class="space-y-3">
      <div>
        <label style="font-size:12px;font-weight:600;color:var(--muted)">이름</label>
        <input type="text" id="workerName" class="input mt-1" placeholder="시공자 이름">
      </div>
      <div>
        <label style="font-size:12px;font-weight:600;color:var(--muted)">색상</label>
        <div id="colorPicker" class="flex flex-wrap gap-2 mt-1"></div>
      </div>
      <div>
        <label style="font-size:12px;font-weight:600;color:var(--muted)">연락처 (선택)</label>
        <input type="text" id="workerPhone" class="input mt-1" placeholder="010-0000-0000">
      </div>
      <div class="flex gap-2 pt-2">
        <button onclick="saveWorker()" class="btn-primary flex-1">저장</button>
        <button onclick="closeWorkerModal()" class="btn-secondary">취소</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── State ───
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let statsYear = new Date().getFullYear();
let statsMonth = new Date().getMonth();
let workers = [];    // [{id, name, color, phone}]
let schedules = {};  // { 'YYYY-MM-DD': [{id, workerId, session, location, memo, status}] }
let activeWorkers = new Set();
let selectedSession = null;
let selectedDate = null;
let editingWorkerId = null;

const COLORS = [
  '#E53E3E','#DD6B20','#D69E2E','#38A169','#319795',
  '#3182CE','#6B46C1','#D53F8C','#2D3748','#00B5D8'
];
let selectedColor = COLORS[0];

const ADMIN_EMAIL = 'kilaloss2@gmail.com'; // Firebase 소유자 이메일 → 관리자
function isAdmin() {
  return window._user && window._user.email === ADMIN_EMAIL;
}

// ─── Auth ───
function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPassword').value;
  document.getElementById('loginErr').classList.add('hidden');
  window._fbFns.signInWithEmailAndPassword(window._auth, email, pw)
    .catch(() => document.getElementById('loginErr').classList.remove('hidden'));
}
function doLogout() { window._fbFns.signOut(window._auth); }

// ─── Tab ───
function switchTab(tab) {
  ['calendar','stats','workers'].forEach(t => {
    document.getElementById(`view-${t}`).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById(`tab-${t}`);
    if (btn) {
      btn.style.background = t === tab ? 'rgba(255,255,255,.2)' : 'transparent';
      btn.style.color = t === tab ? '#fff' : 'rgba(255,255,255,.6)';
    }
  });
  if (tab === 'stats') renderStats();
  if (tab === 'workers') renderWorkerManage();
}

// ─── Firebase: Workers ───
async function loadWorkers() {
  const { collection, getDocs } = window._fbFns;
  const snap = await getDocs(collection(window._db, 'schedule_workers'));
  workers = [];
  snap.forEach(d => workers.push({ id: d.id, ...d.data() }));
  workers.sort((a, b) => (a.order || 0) - (b.order || 0));
  activeWorkers = new Set(workers.map(w => w.id));
}

async function saveWorkerToDb(worker) {
  const { doc, setDoc } = window._fbFns;
  await setDoc(doc(window._db, 'schedule_workers', worker.id), worker);
}

async function deleteWorkerFromDb(id) {
  const { doc, deleteDoc } = window._fbFns;
  await deleteDoc(doc(window._db, 'schedule_workers', id));
}

// ─── Firebase: Schedules ───
async function loadSchedules() {
  const { collection, getDocs } = window._fbFns;
  const snap = await getDocs(collection(window._db, 'schedule_entries'));
  schedules = {};
  snap.forEach(d => {
    const data = d.data();
    const dateKey = data.date;
    if (!schedules[dateKey]) schedules[dateKey] = [];
    schedules[dateKey].push({ id: d.id, ...data });
  });
}

async function saveScheduleToDb(entry) {
  const { doc, setDoc } = window._fbFns;
  await setDoc(doc(window._db, 'schedule_entries', entry.id), entry);
}

async function deleteScheduleFromDb(id) {
  const { doc, deleteDoc } = window._fbFns;
  await deleteDoc(doc(window._db, 'schedule_entries', id));
}

// ─── Calendar ───
function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function renderCalendar() {
  const title = document.getElementById('calTitle');
  title.textContent = `${currentYear}년 ${currentMonth + 1}월`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const today = new Date();
  const firstDay = new Date(currentYear, currentMonth, 1);
  const lastDay  = new Date(currentYear, currentMonth + 1, 0);
  const startPad = firstDay.getDay();

  // Previous month padding
  for (let i = 0; i < startPad; i++) {
    const d = new Date(currentYear, currentMonth, -startPad + i + 1);
    grid.appendChild(makeDayCell(d, true));
  }
  // Current month
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(currentYear, currentMonth, d);
    const isToday = date.toDateString() === today.toDateString();
    grid.appendChild(makeDayCell(date, false, isToday));
  }
  // Next month padding
  const remaining = 42 - (startPad + lastDay.getDate());
  for (let i = 1; i <= remaining; i++) {
    const d = new Date(currentYear, currentMonth + 1, i);
    grid.appendChild(makeDayCell(d, true));
  }

  renderTodayAvailability();
}

function makeDayCell(date, otherMonth, isToday = false) {
  const dow = date.getDay();
  const dateKey = formatDate(date);
  const cell = document.createElement('div');
  cell.className = 'cal-day' +
    (otherMonth ? ' other-month' : '') +
    (isToday ? ' today' : '') +
    (dow === 0 ? ' sunday' : '') +
    (dow === 6 ? ' saturday' : '');

  const numEl = document.createElement('div');
  numEl.className = 'cal-day-num';
  numEl.textContent = date.getDate();
  cell.appendChild(numEl);

  // Schedule chips
  const dayEntries = (schedules[dateKey] || []).filter(e =>
    activeWorkers.has(e.workerId)
  );
  dayEntries.slice(0, 4).forEach(entry => {
    const worker = workers.find(w => w.id === entry.workerId);
    if (!worker) return;
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.style.background = hexToRgba(worker.color, .15);
    chip.style.color = worker.color;
    const sessionLabel = entry.session === 'am' ? '오전' : entry.session === 'pm' ? '오후' : '종일';
    chip.innerHTML = `<span class="chip-dot" style="background:${worker.color}"></span>${worker.name} ${sessionLabel}`;
    chip.title = `${worker.name} · ${sessionLabel}${entry.location ? ' · ' + entry.location : ''}`;
    cell.appendChild(chip);
  });
  if (dayEntries.length > 4) {
    const more = document.createElement('div');
    more.style.cssText = 'font-size:10px;color:var(--muted);padding:1px 4px';
    more.textContent = `+${dayEntries.length - 4}명`;
    cell.appendChild(more);
  }

  cell.onclick = () => openDayModal(date);
  return cell;
}

// ─── Today Availability ───
function renderTodayAvailability() {
  const today = formatDate(new Date());
  const container = document.getElementById('todayAvailability');
  const todayEntries = schedules[today] || [];

  if (todayEntries.length === 0) {
    container.innerHTML = '<p style="font-size:12px;color:var(--muted);text-align:center;padding:12px 0">오늘 등록된 일정이 없습니다</p>';
    return;
  }

  const sessionLabel = { am: '🌅 오전', pm: '🌇 오후', full: '☀️ 종일' };
  container.innerHTML = todayEntries.map(entry => {
    const worker = workers.find(w => w.id === entry.workerId);
    if (!worker) return '';
    return `<div class="avail-row">
      <span style="width:8px;height:8px;border-radius:50%;background:${worker.color};flex-shrink:0;display:inline-block"></span>
      <span style="font-size:13px;font-weight:600;flex:1">${worker.name}</span>
      <span style="font-size:11px;font-weight:700;color:${worker.color}">${sessionLabel[entry.session]}</span>
    </div>`;
  }).join('');
}

// ─── Worker Filter Sidebar ───
function renderWorkerList() {
  const container = document.getElementById('workerFilterList');
  container.innerHTML = workers.map(w => `
    <div class="worker-row ${activeWorkers.has(w.id) ? '' : 'inactive'}" onclick="toggleWorker('${w.id}')">
      <span style="width:10px;height:10px;border-radius:50%;background:${w.color};display:inline-block;flex-shrink:0"></span>
      <span style="font-size:13px;font-weight:500;flex:1;margin-left:8px">${w.name}</span>
      <span style="font-size:11px;color:var(--muted)">${getWorkerMonthCount(w.id)}일</span>
    </div>`).join('');
}

function toggleWorker(id) {
  if (activeWorkers.has(id)) activeWorkers.delete(id);
  else activeWorkers.add(id);
  renderWorkerList();
  renderCalendar();
}

function toggleAllWorkers() {
  if (activeWorkers.size === workers.length) activeWorkers.clear();
  else workers.forEach(w => activeWorkers.add(w.id));
  renderWorkerList();
  renderCalendar();
}

function getWorkerMonthCount(workerId) {
  let count = 0;
  Object.keys(schedules).forEach(dateKey => {
    const [y, m] = dateKey.split('-').map(Number);
    if (y === currentYear && m === currentMonth + 1) {
      if (schedules[dateKey].some(e => e.workerId === workerId)) count++;
    }
  });
  return count;
}

// ─── Day Modal ───
function openDayModal(date) {
  selectedDate = date;
  selectedSession = null;
  document.getElementById('scheduleLocation').value = '';
  document.getElementById('scheduleMemo').value = '';
  ['am','pm','full'].forEach(s => {
    document.getElementById(`btn-${s}`).className = 'session-btn';
  });

  const dow = ['일','월','화','수','목','금','토'][date.getDay()];
  document.getElementById('modalDateTitle').textContent =
    `${date.getFullYear()}년 ${date.getMonth()+1}월 ${date.getDate()}일 (${dow})`;

  // Worker select
  const sel = document.getElementById('scheduleWorker');
  sel.innerHTML = '<option value="">선택...</option>' +
    workers.map(w => `<option value="${w.id}">${w.name}</option>`).join('');

  renderDayScheduleList(date);
  document.getElementById('dayModal').classList.remove('hidden');
}

function closeDayModal() {
  document.getElementById('dayModal').classList.add('hidden');
}

function renderDayScheduleList(date) {
  const dateKey = formatDate(date);
  const entries = schedules[dateKey] || [];
  const container = document.getElementById('dayScheduleList');
  const sessionLabel = { am: '🌅 오전', pm: '🌇 오후', full: '☀️ 종일' };
  const sessionClass = { am: 'session-am', pm: 'session-pm', full: 'session-full' };

  if (entries.length === 0) {
    container.innerHTML = '<p style="font-size:12px;color:var(--muted)">등록된 일정이 없습니다</p>';
    return;
  }

  container.innerHTML = entries.map(entry => {
    const worker = workers.find(w => w.id === entry.workerId);
    if (!worker) return '';
    const canDelete = isAdmin() || entry.addedBy === window._user?.uid;
    return `<div style="display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg);border-radius:8px;margin-bottom:6px">
      <span style="width:10px;height:10px;border-radius:50%;background:${worker.color};flex-shrink:0"></span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700">${worker.name}
          <span class="session-badge ${sessionClass[entry.session]}" style="margin-left:4px">${sessionLabel[entry.session]}</span>
        </div>
        ${entry.location ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">📍 ${entry.location}</div>` : ''}
        ${entry.memo ? `<div style="font-size:11px;color:var(--muted)">📝 ${entry.memo}</div>` : ''}
      </div>
      ${canDelete ? `<button onclick="removeSchedule('${entry.id}','${dateKey}')" style="background:#FFF5F5;border:none;color:#C53030;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer">삭제</button>` : ''}
    </div>`;
  }).join('');
}

function selectSession(s) {
  selectedSession = s;
  ['am','pm','full'].forEach(x => {
    document.getElementById(`btn-${x}`).className = `session-btn${x === s ? ` active-${x}` : ''}`;
  });
}

async function addSchedule() {
  const workerId = document.getElementById('scheduleWorker').value;
  const location = document.getElementById('scheduleLocation').value.trim();
  const memo = document.getElementById('scheduleMemo').value.trim();

  if (!workerId) { alert('시공자를 선택해주세요.'); return; }
  if (!selectedSession) { alert('근무 시간을 선택해주세요.'); return; }
  if (!selectedDate) return;

  const dateKey = formatDate(selectedDate);
  const id = `${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
  const entry = { id, workerId, date: dateKey, session: selectedSession, location, memo, addedBy: window._user?.uid };

  try {
    await saveScheduleToDb(entry);
    if (!schedules[dateKey]) schedules[dateKey] = [];
    schedules[dateKey].push(entry);
    renderDayScheduleList(selectedDate);
    renderCalendar();
    renderWorkerList();
    // Reset form
    document.getElementById('scheduleWorker').value = '';
    document.getElementById('scheduleLocation').value = '';
    document.getElementById('scheduleMemo').value = '';
    selectedSession = null;
    ['am','pm','full'].forEach(s => document.getElementById(`btn-${s}`).className = 'session-btn');
  } catch(e) { alert('저장 중 오류가 발생했습니다.'); console.error(e); }
}

async function removeSchedule(id, dateKey) {
  if (!confirm('이 일정을 삭제할까요?')) return;
  try {
    await deleteScheduleFromDb(id);
    schedules[dateKey] = (schedules[dateKey] || []).filter(e => e.id !== id);
    renderDayScheduleList(selectedDate);
    renderCalendar();
    renderWorkerList();
  } catch(e) { alert('삭제 중 오류가 발생했습니다.'); }
}

// ─── Kakao Share ───
function shareKakao() {
  if (!selectedDate) return;
  const dateKey = formatDate(selectedDate);
  const entries = schedules[dateKey] || [];
  const dow = ['일','월','화','수','목','금','토'][selectedDate.getDay()];
  const dateStr = `${selectedDate.getMonth()+1}/${selectedDate.getDate()}(${dow})`;
  const sessionLabel = { am: '오전', pm: '오후', full: '종일' };
  let text = `📅 [로젠필름 ${dateStr} 일정]\n`;
  if (entries.length === 0) { text += '등록된 일정 없음'; }
  else {
    entries.forEach(e => {
      const w = workers.find(w => w.id === e.workerId);
      if (w) text += `\n• ${w.name} (${sessionLabel[e.session]})${e.location ? ' - ' + e.location : ''}`;
    });
  }
  const encoded = encodeURIComponent(text);
  window.open(`https://story.kakao.com/share?url=${encoded}`, '_blank');
  // Fallback: copy to clipboard
  navigator.clipboard.writeText(text).then(() => alert('일정이 클립보드에 복사되었습니다!\n카카오톡 단톡방에 붙여넣기 하세요 😊'));
}

// ─── Stats ───
function changeStatsMonth(delta) {
  statsMonth += delta;
  if (statsMonth > 11) { statsMonth = 0; statsYear++; }
  if (statsMonth < 0)  { statsMonth = 11; statsYear--; }
  renderStats();
}

function renderStats() {
  document.getElementById('statsMonthTitle').textContent = `${statsYear}년 ${statsMonth + 1}월`;
  const grid = document.getElementById('statsGrid');
  const detail = document.getElementById('statsDetail');

  const monthEntries = {};
  workers.forEach(w => monthEntries[w.id] = { days: 0, am: 0, pm: 0, full: 0, dates: [] });

  Object.keys(schedules).forEach(dateKey => {
    const [y, m] = dateKey.split('-').map(Number);
    if (y === statsYear && m === statsMonth + 1) {
      schedules[dateKey].forEach(entry => {
        if (monthEntries[entry.workerId] !== undefined) {
          monthEntries[entry.workerId].days++;
          monthEntries[entry.workerId][entry.session]++;
          monthEntries[entry.workerId].dates.push({ date: dateKey, session: entry.session, location: entry.location });
        }
      });
    }
  });

  grid.innerHTML = workers.map(w => {
    const stat = monthEntries[w.id];
    return `<div class="stat-card">
      <div class="flex items-center gap-2 mb-3">
        <span style="width:12px;height:12px;border-radius:50%;background:${w.color};display:inline-block"></span>
        <span style="font-weight:700;font-size:15px">${w.name}</span>
      </div>
      <div style="font-size:28px;font-weight:800;color:${w.color}">${stat.days}일</div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">
        ${stat.am > 0 ? `오전 ${stat.am}회 · ` : ''}${stat.pm > 0 ? `오후 ${stat.pm}회 · ` : ''}${stat.full > 0 ? `종일 ${stat.full}회` : ''}
      </div>
      ${w.phone ? `<div style="font-size:11px;color:var(--muted);margin-top:4px">${w.phone}</div>` : ''}
    </div>`;
  }).join('');

  // Half-day availability summary
  const halfDayWorkers = workers.filter(w => {
    const stat = monthEntries[w.id];
    return stat.am > 0 || stat.pm > 0;
  });
  if (halfDayWorkers.length > 0) {
    detail.innerHTML = `<div style="background:#fff;border-radius:12px;border:1px solid var(--border);padding:16px;margin-top:4px">
      <p style="font-size:13px;font-weight:700;margin-bottom:10px">🔍 반나절 가용 내역</p>
      ${halfDayWorkers.map(w => {
        const stat = monthEntries[w.id];
        const halfDays = stat.dates.filter(d => d.session !== 'full');
        return `<div style="margin-bottom:10px">
          <div style="font-size:13px;font-weight:600;color:${w.color};margin-bottom:4px">${w.name}</div>
          ${halfDays.map(d => {
            const sessionLabel = d.session === 'am' ? '🌅 오전' : '🌇 오후';
            return `<div style="font-size:12px;color:var(--muted);padding:3px 0">${d.date} · ${sessionLabel}${d.location ? ' · ' + d.location : ''}</div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>`;
  } else {
    detail.innerHTML = '';
  }
}

// ─── Worker Manage ───
function openAddWorkerModal(id = null) {
  editingWorkerId = id;
  const worker = id ? workers.find(w => w.id === id) : null;
  document.getElementById('workerModalTitle').textContent = id ? '팀원 수정' : '팀원 추가';
  document.getElementById('workerName').value = worker?.name || '';
  document.getElementById('workerPhone').value = worker?.phone || '';
  selectedColor = worker?.color || COLORS[0];

  const picker = document.getElementById('colorPicker');
  picker.innerHTML = COLORS.map(c => `
    <div onclick="selectColor('${c}')" id="color-${c.slice(1)}"
      style="width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;
      border:3px solid ${c === selectedColor ? '#1A202C' : 'transparent'};transition:border .1s"></div>
  `).join('');

  document.getElementById('workerModal').classList.remove('hidden');
}

function selectColor(c) {
  selectedColor = c;
  COLORS.forEach(col => {
    const el = document.getElementById(`color-${col.slice(1)}`);
    if (el) el.style.border = `3px solid ${col === c ? '#1A202C' : 'transparent'}`;
  });
}

function closeWorkerModal() {
  document.getElementById('workerModal').classList.add('hidden');
}

async function saveWorker() {
  const name = document.getElementById('workerName').value.trim();
  const phone = document.getElementById('workerPhone').value.trim();
  if (!name) { alert('이름을 입력해주세요.'); return; }

  const id = editingWorkerId || `worker_${Date.now()}`;
  const worker = { id, name, color: selectedColor, phone, order: workers.length };

  try {
    await saveWorkerToDb(worker);
    if (editingWorkerId) {
      const idx = workers.findIndex(w => w.id === editingWorkerId);
      if (idx > -1) workers[idx] = worker;
    } else {
      workers.push(worker);
      activeWorkers.add(id);
    }
    closeWorkerModal();
    renderWorkerManage();
    renderWorkerList();
    renderCalendar();
  } catch(e) { alert('저장 중 오류가 발생했습니다.'); }
}

async function deleteWorker(id) {
  if (!confirm('이 팀원을 삭제할까요?\n(해당 팀원의 일정도 모두 삭제됩니다)')) return;
  try {
    await deleteWorkerFromDb(id);
    workers = workers.filter(w => w.id !== id);
    activeWorkers.delete(id);
    renderWorkerManage();
    renderWorkerList();
    renderCalendar();
  } catch(e) { alert('삭제 중 오류가 발생했습니다.'); }
}

function renderWorkerManage() {
  const container = document.getElementById('workerManageList');
  if (workers.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">등록된 팀원이 없습니다.<br>+ 팀원 추가 버튼을 눌러 추가하세요.</div>';
    return;
  }
  container.innerHTML = workers.map(w => `
    <div style="background:#fff;border-radius:12px;border:1px solid var(--border);padding:14px;display:flex;align-items:center;gap:12px">
      <span style="width:36px;height:36px;border-radius:50%;background:${w.color};display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0">${w.name[0]}</span>
      <div style="flex:1">
        <div style="font-size:15px;font-weight:700">${w.name}</div>
        ${w.phone ? `<div style="font-size:12px;color:var(--muted)">${w.phone}</div>` : ''}
      </div>
      ${isAdmin() ? `
        <button onclick="openAddWorkerModal('${w.id}')" class="btn-secondary" style="padding:6px 12px;font-size:12px">수정</button>
        <button onclick="deleteWorker('${w.id}')" class="btn-danger" style="padding:6px 12px;font-size:12px">삭제</button>
      ` : ''}
    </div>`).join('');
}

// ─── Helpers ───
function formatDate(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
