<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로젠필름 재단 최적화</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.22.5/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    @media print {
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area {
        display: block !important;
        position: absolute; left: 0; top: 0; width: 100%; padding: 12mm;
      }
      #print-area table { width: 100%; border-collapse: collapse; font-size: 11px; }
      #print-area th, #print-area td { border: 1px solid #999; padding: 4px 6px; text-align: left; }
      #print-area img { max-width: 100%; margin-top: 12px; }
      .no-print { display: none !important; }
    }
    #print-area { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const GROUP_PRESET_STORAGE_KEY = 'rosenfilm_group_presets_v1';
    const PRESET_CATEGORY_STORAGE_KEY = 'rosenfilm_preset_categories_v1';
    const JOB_STORAGE_KEY = 'rosenfilm_jobs_v1';
    const RESULT_STORAGE_KEY = 'rosenfilm_saved_results_v1';
    const UNCATEGORIZED_PRESET = '미분류';

    const loadGroupPresets = () => {
      try {
        const raw = localStorage.getItem(GROUP_PRESET_STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        console.error('부위 프리셋 불러오기 오류:', e);
        return [];
      }
    };

    const loadPresetCategories = () => {
      try {
        const raw = localStorage.getItem(PRESET_CATEGORY_STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        console.error('프리셋 카테고리 불러오기 오류:', e);
        return [];
      }
    };

    const loadJobs = () => {
      try {
        const raw = localStorage.getItem(JOB_STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        console.error('현장 데이터 불러오기 오류:', e);
        return [];
      }
    };

    const loadSavedResults = () => {
      try {
        const raw = localStorage.getItem(RESULT_STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        console.error('저장된 결과 불러오기 오류:', e);
        return [];
      }
    };

    const CLOUD_SETTINGS_KEY = 'rosenfilm_cloud_settings_v1';

    // 이 파일 전용 기본 클라우드 설정. 매번 직접 입력하지 않아도 어떤 기기에서 열어도
    // 자동으로 같은 작업장에 연결되도록, 실제 사용 중인 값을 미리 넣어둔다.
    // 다른 Firebase 프로젝트/작업장 코드로 바꾸고 싶으면 "설정 열기"에서 언제든 변경 가능하다.
    const DEFAULT_FIREBASE_CONFIG_TEXT = JSON.stringify({
      apiKey: "AIzaSyD1Nqi0J2ust7UTo6XQOLofZobOHS2O7dU",
      authDomain: "rozenfilm-estimate.firebaseapp.com",
      projectId: "rozenfilm-estimate",
      storageBucket: "rozenfilm-estimate.firebasestorage.app",
      messagingSenderId: "205994221853",
      appId: "1:205994221853:web:66cf3b8f7e90f9672581f4",
    }, null, 2);
    const DEFAULT_WORKSPACE_CODE = 'rozenk';

    const loadCloudSettings = () => {
      try {
        const raw = localStorage.getItem(CLOUD_SETTINGS_KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) {
        // 저장된 값이 손상된 경우 기본값으로 대체
      }
      return { configText: DEFAULT_FIREBASE_CONFIG_TEXT, workspaceCode: DEFAULT_WORKSPACE_CODE };
    };

    // Firestore는 필드 값으로 undefined를 허용하지 않고, undefined가 하나라도 섞여 있으면
    // 문서 전체 쓰기가 통째로 실패한다(에러가 조용히 콘솔에만 남고 화면엔 티가 잘 안 남).
    // 예전 버전에서 저장된 데이터에 필드가 비어있을 수 있으므로, 클라우드로 보내기 전에
    // undefined를 전부 null로 바꿔서 항상 안전하게 저장되도록 한다.
    const sanitizeForFirestore = (value) => {
      if (Array.isArray(value)) return value.map(sanitizeForFirestore);
      if (value && typeof value === 'object') {
        const result = {};
        Object.keys(value).forEach((k) => {
          const v = value[k];
          result[k] = v === undefined ? null : sanitizeForFirestore(v);
        });
        return result;
      }
      return value === undefined ? null : value;
    };

    const CuttingOptimizer = () => {
      const [filmSize, setFilmSize] = useState({ width: 1220, length: 50000 });
      const [rotationAllowed, setRotationAllowed] = useState(true); // 회전 허용 (필름 규격 옆 전역 설정)
      const [surfaces, setSurfaces] = useState([
        { width: 0, height: 0, count: 1, label: '', category: '' }
      ]);
      const [result, setResult] = useState(null);
      const [fontSize, setFontSize] = useState(20);
      const canvasRefs = useRef([]); // 롤별 캔버스 (result.rollCount개)
      const [printImageUrls, setPrintImageUrls] = useState([]); // 롤별 인쇄용 이미지

      // ---- 샷시 + 롤컷 통합 계산기 (엑셀 롤컷계산기 로직 반영) ----
      // 샷시 틀 사이즈(가로/세로)와 단창/이중창 수량, 걸레받이·몰딩 등 기타 항목을 입력하면,
      // 폭 종류별 필요 길이(m)를 계산하고, 그 자리에서 바로 롤컷 레인 배분까지 계산해서 보여준다.
      const [showRollCutCalc, setShowRollCutCalc] = useState(false);
      const [rollCutResult, setRollCutResult] = useState(null);
      const [shashiWidths, setShashiWidths] = useState({
        frame: '100', daedae: '170', jungan: '120', w3: '70', w4: '50', meori: '100',
      });
      const [shashiRows, setShashiRows] = useState([
        { type: '3피스', width: '', height: '', singleQty: '', doubleQty: '', label: '' }
      ]);
      const [shashiExtras, setShashiExtras] = useState([
        { width: '', length: '', label: '' }
      ]);

      // ---- 부위별 그룹 보기 ----
      const UNCATEGORIZED = '미분류';
      const [collapsedCats, setCollapsedCats] = useState({});
      const [scrollTarget, setScrollTarget] = useState(null);
      const categoryRefs = useRef({});

      const jumpToCategory = useCallback((cat) => {
        setCollapsedCats(prev => ({ ...prev, [cat]: false }));
        setScrollTarget(cat);
      }, []);

      const toggleCategoryCollapsed = useCallback((cat) => {
        setCollapsedCats(prev => ({ ...prev, [cat]: !prev[cat] }));
      }, []);

      // 부위 그룹 전체 복제: 그 부위의 모든 항목을 "(사본)"이 붙은 새 부위로 통째로 복제한다.
      const duplicateCategory = useCallback((cat) => {
        const targetCat = cat === UNCATEGORIZED ? '' : cat;
        const itemsInCat = surfaces.filter(s => ((s.category || '').trim() || UNCATEGORIZED) === cat);
        if (itemsInCat.length === 0) return;

        let newCatName = `${cat === UNCATEGORIZED ? '' : cat} 사본`.trim() || '사본';
        // 이미 같은 이름의 부위가 있으면 뒤에 숫자를 붙여 구분
        const existingCats = new Set(surfaces.map(s => (s.category || '').trim() || UNCATEGORIZED));
        let suffix = 2;
        let finalName = newCatName;
        while (existingCats.has(finalName)) {
          finalName = `${newCatName} ${suffix}`;
          suffix++;
        }

        const duplicated = itemsInCat.map(s => ({ ...s, category: finalName }));
        setSurfaces(prev => [...prev, ...duplicated]);
        setCollapsedCats(prev => ({ ...prev, [finalName]: false }));
        setScrollTarget(finalName);
      }, [surfaces]);

      // 부위 그룹 통째로 삭제
      const deleteCategoryGroup = useCallback((cat) => {
        const itemsInCat = surfaces.filter(s => ((s.category || '').trim() || UNCATEGORIZED) === cat);
        if (!window.confirm(`'${cat}' 부위의 항목 ${itemsInCat.length}개를 전부 삭제할까요?`)) return;
        setSurfaces(prev => prev.filter(s => ((s.category || '').trim() || UNCATEGORIZED) !== cat));
      }, [surfaces]);

      // 부위 이름 변경: 해당 부위의 모든 항목의 category 값을 새 이름으로 일괄 변경
      const renameCategoryGroup = useCallback((cat) => {
        const currentName = cat === UNCATEGORIZED ? '' : cat;
        const newName = window.prompt('새 부위 이름을 입력하세요.', currentName);
        if (newName === null) return; // 취소
        const trimmed = newName.trim();
        setSurfaces(prev => prev.map(s => {
          const sCat = (s.category || '').trim() || UNCATEGORIZED;
          return sCat === cat ? { ...s, category: trimmed } : s;
        }));
        const finalCat = trimmed || UNCATEGORIZED;
        setCollapsedCats(prev => ({ ...prev, [finalCat]: false }));
      }, []);

      // 부위 안의 모든 항목 폭/세로를 한 번에 늘리거나 줄인다 (폭 10mm 단위, 세로 50mm 단위).
      const adjustCategoryDimension = useCallback((cat, field, delta) => {
        const minValue = field === 'width' ? 10 : 50;
        setSurfaces(prev => prev.map(s => {
          const sCat = (s.category || '').trim() || UNCATEGORIZED;
          if (sCat !== cat) return s;
          return { ...s, [field]: Math.max(minValue, (Number(s[field]) || 0) + delta) };
        }));
      }, []);

      useEffect(() => {
        if (scrollTarget && categoryRefs.current[scrollTarget]) {
          categoryRefs.current[scrollTarget].scrollIntoView({ behavior: 'smooth', block: 'start' });
          setScrollTarget(null);
        }
      }, [scrollTarget, surfaces, collapsedCats]);

      // ---- 현장 데이터 + 프리셋 상태 (클라우드 동기화보다 먼저 선언되어야 함) ----
      const [jobName, setJobName] = useState('');
      const [savedJobs, setSavedJobs] = useState(loadJobs);

      useEffect(() => {
        localStorage.setItem(JOB_STORAGE_KEY, JSON.stringify(savedJobs));
      }, [savedJobs]);

      const [groupPresets, setGroupPresets] = useState(loadGroupPresets);

      useEffect(() => {
        localStorage.setItem(GROUP_PRESET_STORAGE_KEY, JSON.stringify(groupPresets));
      }, [groupPresets]);

      const [presetCategories, setPresetCategories] = useState(loadPresetCategories);

      useEffect(() => {
        localStorage.setItem(PRESET_CATEGORY_STORAGE_KEY, JSON.stringify(presetCategories));
      }, [presetCategories]);

      // ---- 저장된 결과(재단 최적화 + 롤컷 계산) ----
      const [savedResults, setSavedResults] = useState(loadSavedResults);
      const [resultSearchQuery, setResultSearchQuery] = useState('');

      useEffect(() => {
        localStorage.setItem(RESULT_STORAGE_KEY, JSON.stringify(savedResults));
      }, [savedResults]);

      // ---- 클라우드 동기화 (Firebase Firestore) ----
      // 부위 프리셋 + 현장 데이터를 "작업장 코드" 하나로 묶어서 여러 기기가 실시간으로 공유하도록 한다.
      const initialCloudSettings = loadCloudSettings();
      const [cloudConfigText, setCloudConfigText] = useState(initialCloudSettings.configText);
      const [workspaceCode, setWorkspaceCode] = useState(initialCloudSettings.workspaceCode);
      const [cloudStatus, setCloudStatus] = useState('disconnected'); // disconnected | connecting | connected | error
      const [cloudError, setCloudError] = useState('');
      const [showCloudSettings, setShowCloudSettings] = useState(!(initialCloudSettings.configText && initialCloudSettings.workspaceCode));
      const firebaseAppRef = useRef(null);
      const firestoreRef = useRef(null);
      const unsubscribeCloudRef = useRef(null);

      const disconnectCloud = useCallback(() => {
        if (unsubscribeCloudRef.current) {
          unsubscribeCloudRef.current();
          unsubscribeCloudRef.current = null;
        }
        if (firebaseAppRef.current) {
          firebaseAppRef.current.delete().catch(() => {});
          firebaseAppRef.current = null;
        }
        firestoreRef.current = null;
        setCloudStatus('disconnected');
      }, []);

      // 현장/프리셋을 "문서 하나에 배열 통째로" 저장하면, 여러 기기가 동시에 열려있을 때
      // 한 기기가 삭제해도 다른 기기가 예전 배열을 그대로 다시 덮어써서 삭제가 되살아나는
      // 문제가 생긴다. 그래서 현장 하나·프리셋 하나를 각각 별도의 문서로 저장해서,
      // 저장/삭제가 항상 "그 문서 하나만" 건드리도록 한다 (다른 기기의 상태와 무관하게 안전).
      const getJobsCollRef = useCallback(() => {
        if (!firestoreRef.current || !workspaceCode.trim()) return null;
        return firestoreRef.current.collection('workspaces').doc(workspaceCode.trim()).collection('jobs');
      }, [workspaceCode]);

      const getGroupPresetsCollRef = useCallback(() => {
        if (!firestoreRef.current || !workspaceCode.trim()) return null;
        return firestoreRef.current.collection('workspaces').doc(workspaceCode.trim()).collection('groupPresets');
      }, [workspaceCode]);

      const getPresetCategoriesCollRef = useCallback(() => {
        if (!firestoreRef.current || !workspaceCode.trim()) return null;
        return firestoreRef.current.collection('workspaces').doc(workspaceCode.trim()).collection('presetCategories');
      }, [workspaceCode]);

      const getSavedResultsCollRef = useCallback(() => {
        if (!firestoreRef.current || !workspaceCode.trim()) return null;
        return firestoreRef.current.collection('workspaces').doc(workspaceCode.trim()).collection('savedResults');
      }, [workspaceCode]);

      const cloudSaveJob = useCallback((jobData) => {
        const ref = getJobsCollRef();
        if (!ref || cloudStatus !== 'connected') return;
        ref.doc(jobData.id).set(sanitizeForFirestore(jobData)).catch((err) => {
          console.error('클라우드 저장 오류(현장):', err);
          setCloudError('클라우드 저장 실패: ' + err.message);
          alert('클라우드 저장에 실패했습니다: ' + err.message);
        });
      }, [getJobsCollRef, cloudStatus]);

      const cloudDeleteJob = useCallback((id) => {
        const ref = getJobsCollRef();
        if (!ref || cloudStatus !== 'connected') return;
        ref.doc(id).delete().catch((err) => {
          console.error('클라우드 삭제 오류(현장):', err);
          setCloudError('클라우드 삭제 실패: ' + err.message);
          alert('클라우드에서 삭제하는 데 실패했습니다: ' + err.message);
        });
      }, [getJobsCollRef, cloudStatus]);

      const cloudSaveGroupPreset = useCallback((presetData) => {
        const ref = getGroupPresetsCollRef();
        if (!ref || cloudStatus !== 'connected') return;
        ref.doc(presetData.id).set(sanitizeForFirestore(presetData)).catch((err) => {
          console.error('클라우드 저장 오류(부위 프리셋):', err);
          setCloudError('클라우드 저장 실패: ' + err.message);
          alert('클라우드 저장에 실패했습니다: ' + err.message);
        });
      }, [getGroupPresetsCollRef, cloudStatus]);

      const cloudDeleteGroupPreset = useCallback((id) => {
        const ref = getGroupPresetsCollRef();
        if (!ref || cloudStatus !== 'connected') return;
        ref.doc(id).delete().catch((err) => {
          console.error('클라우드 삭제 오류(부위 프리셋):', err);
          setCloudError('클라우드 삭제 실패: ' + err.message);
          alert('클라우드에서 삭제하는 데 실패했습니다: ' + err.message);
        });
      }, [getGroupPresetsCollRef, cloudStatus]);

      const cloudSavePresetCategory = useCallback((categoryData) => {
        const ref = getPresetCategoriesCollRef();
        if (!ref || cloudStatus !== 'connected') return;
        ref.doc(categoryData.id).set(sanitizeForFirestore(categoryData)).catch((err) => {
          console.error('클라우드 저장 오류(프리셋 카테고리):', err);
          setCloudError('클라우드 저장 실패: ' + err.message);
          alert('클라우드 저장에 실패했습니다: ' + err.message);
        });
      }, [getPresetCategoriesCollRef, cloudStatus]);

      const cloudDeletePresetCategory = useCallback((id) => {
        const ref = getPresetCategoriesCollRef();
        if (!ref || cloudStatus !== 'connected') return;
        ref.doc(id).delete().catch((err) => {
          console.error('클라우드 삭제 오류(프리셋 카테고리):', err);
          setCloudError('클라우드 삭제 실패: ' + err.message);
          alert('클라우드에서 삭제하는 데 실패했습니다: ' + err.message);
        });
      }, [getPresetCategoriesCollRef, cloudStatus]);

      const cloudSaveResult = useCallback((data) => {
        const ref = getSavedResultsCollRef();
        if (!ref || cloudStatus !== 'connected') return Promise.resolve(false);
        return ref.doc(data.id).set(sanitizeForFirestore(data))
          .then(() => true)
          .catch((err) => {
            console.error('클라우드 저장 오류(결과):', err);
            setCloudError('클라우드 저장 실패: ' + err.message);
            alert('클라우드 저장에 실패했습니다: ' + err.message);
            return false;
          });
      }, [getSavedResultsCollRef, cloudStatus]);

      const cloudDeleteResult = useCallback((id) => {
        const ref = getSavedResultsCollRef();
        if (!ref || cloudStatus !== 'connected') return;
        ref.doc(id).delete().catch((err) => {
          console.error('클라우드 삭제 오류(결과):', err);
          setCloudError('클라우드 삭제 실패: ' + err.message);
          alert('클라우드에서 삭제하는 데 실패했습니다: ' + err.message);
        });
      }, [getSavedResultsCollRef, cloudStatus]);

      const connectCloud = useCallback(() => {
        setCloudError('');

        if (typeof firebase === 'undefined') {
          setCloudStatus('error');
          setCloudError('Firebase 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인해주세요.');
          return;
        }

        let config;
        try {
          config = JSON.parse(cloudConfigText);
        } catch (e) {
          setCloudStatus('error');
          setCloudError('Firebase 설정 JSON 형식이 올바르지 않습니다. Firebase 콘솔에서 복사한 config 전체를 붙여넣어주세요.');
          return;
        }

        const code = workspaceCode.trim();
        if (!code) {
          setCloudStatus('error');
          setCloudError('작업장 코드를 입력해주세요. 같은 코드를 입력한 기기끼리 데이터가 공유됩니다.');
          return;
        }

        setCloudStatus('connecting');
        disconnectCloud();

        try {
          const appName = 'rosenfilm-' + Date.now();
          const app = firebase.initializeApp(config, appName);
          const db = app.firestore();
          firebaseAppRef.current = app;
          firestoreRef.current = db;

          const jobsCollRef = db.collection('workspaces').doc(code).collection('jobs');
          const groupPresetsCollRef = db.collection('workspaces').doc(code).collection('groupPresets');
          const presetCategoriesCollRef = db.collection('workspaces').doc(code).collection('presetCategories');
          const savedResultsCollRef = db.collection('workspaces').doc(code).collection('savedResults');

          let jobsReady = false, groupPresetsReady = false, presetCategoriesReady = false, savedResultsReady = false;
          const markConnectedIfReady = () => {
            if (jobsReady && groupPresetsReady && presetCategoriesReady && savedResultsReady) {
              setCloudStatus('connected');
              setCloudError('');
            }
          };

          const unsubJobs = jobsCollRef.onSnapshot(
            (snap) => {
              jobsReady = true;
              setSavedJobs(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
              markConnectedIfReady();
            },
            (err) => {
              console.error('Firestore(현장) 동기화 오류:', err);
              setCloudStatus('error');
              setCloudError('동기화 오류(현장): ' + err.message + ' (Firestore 보안 규칙을 확인해주세요.)');
            }
          );

          const unsubGroupPresets = groupPresetsCollRef.onSnapshot(
            (snap) => {
              groupPresetsReady = true;
              setGroupPresets(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
              markConnectedIfReady();
            },
            (err) => {
              console.error('Firestore(부위 프리셋) 동기화 오류:', err);
              setCloudStatus('error');
              setCloudError('동기화 오류(부위 프리셋): ' + err.message + ' (Firestore 보안 규칙을 확인해주세요.)');
            }
          );

          const unsubPresetCategories = presetCategoriesCollRef.onSnapshot(
            (snap) => {
              presetCategoriesReady = true;
              setPresetCategories(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
              markConnectedIfReady();
            },
            (err) => {
              console.error('Firestore(프리셋 카테고리) 동기화 오류:', err);
              setCloudStatus('error');
              setCloudError('동기화 오류(프리셋 카테고리): ' + err.message + ' (Firestore 보안 규칙을 확인해주세요.)');
            }
          );

          const unsubSavedResults = savedResultsCollRef.onSnapshot(
            (snap) => {
              savedResultsReady = true;
              setSavedResults(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
              markConnectedIfReady();
            },
            (err) => {
              console.error('Firestore(저장된 결과) 동기화 오류:', err);
              setCloudStatus('error');
              setCloudError('동기화 오류(저장된 결과): ' + err.message + ' (Firestore 보안 규칙을 확인해주세요.)');
            }
          );

          unsubscribeCloudRef.current = () => {
            unsubJobs(); unsubGroupPresets(); unsubPresetCategories(); unsubSavedResults();
          };

          localStorage.setItem(CLOUD_SETTINGS_KEY, JSON.stringify({ configText: cloudConfigText, workspaceCode: code }));
          setShowCloudSettings(false);
        } catch (e) {
          console.error('Firebase 연결 오류:', e);
          setCloudStatus('error');
          setCloudError('연결 실패: ' + e.message);
        }
      }, [cloudConfigText, workspaceCode, disconnectCloud]);

      // 최초 진입 시, 저장된 클라우드 설정이 있으면 자동 재연결
      useEffect(() => {
        if (initialCloudSettings.configText && initialCloudSettings.workspaceCode) {
          connectCloud();
        }
        return () => disconnectCloud();
        // eslint-disable-next-line
      }, []);

      // ---- 현장명으로 작업 데이터 저장/불러오기 ----
      const saveCurrentJob = useCallback(() => {
        const name = jobName.trim();
        if (!name) {
          alert('현장명을 입력해주세요.');
          return;
        }
        const existing = savedJobs.find(j => j.name === name);
        if (existing && !window.confirm(`'${name}' 현장 데이터가 이미 있습니다. 덮어쓸까요?`)) {
          return;
        }
        const jobData = {
          id: existing ? existing.id : Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          name,
          savedAt: new Date().toISOString(),
          filmSize, rotationAllowed, surfaces,
        };
        if (cloudStatus === 'connected') {
          // 연결된 상태에서는 이 문서 하나만 클라우드에 쓰고, 화면 목록은 실시간 리스너가 갱신한다.
          cloudSaveJob(jobData);
        } else {
          const updatedJobs = existing
            ? savedJobs.map(j => (j.id === existing.id ? jobData : j))
            : [...savedJobs, jobData];
          setSavedJobs(updatedJobs);
        }
        alert(`'${name}' 저장되었습니다.`);
      }, [jobName, savedJobs, filmSize, rotationAllowed, surfaces, cloudStatus, cloudSaveJob]);

      const loadJob = useCallback((job) => {
        if (!job || !job.filmSize || typeof job.filmSize.width !== 'number' || typeof job.filmSize.length !== 'number' || !Array.isArray(job.surfaces)) {
          alert('이 현장 데이터가 손상되었거나 형식이 올바르지 않아 불러올 수 없습니다.');
          return;
        }
        if (!window.confirm(`'${job.name}' 데이터를 현재 시공 면적 목록에 추가할까요? (기존 목록은 유지되고 뒤에 추가됩니다)`)) return;
        setFilmSize(job.filmSize);
        if (job.rotationAllowed !== undefined) setRotationAllowed(job.rotationAllowed);
        const incomingSurfaces = job.surfaces.map(s => ({
          width: Number(s.width) || 0,
          height: Number(s.height) || 0,
          count: Math.max(1, Number(s.count) || 1),
          label: s.label || '',
          category: s.category || '',
        }));
        setSurfaces(prev => {
          const isEmptyOnly = prev.length === 1 && !prev[0].width && !prev[0].height && !prev[0].label && !prev[0].category;
          return isEmptyOnly ? incomingSurfaces : [...prev, ...incomingSurfaces];
        });
        setResult(null);
      }, []);

      const deleteJob = useCallback((id, name) => {
        if (!window.confirm(`'${name}' 현장 데이터를 삭제할까요?`)) return;
        if (cloudStatus === 'connected') {
          cloudDeleteJob(id);
        } else {
          setSavedJobs(prev => prev.filter(j => j.id !== id));
        }
      }, [cloudStatus, cloudDeleteJob]);

      // ---- 현장 데이터 JSON 내보내기 / 불러오기 (구글드라이브 등 클라우드 공유용) ----
      const jobFileInputRef = useRef(null);

      const exportJobs = useCallback(() => {
        if (savedJobs.length === 0) {
          alert('내보낼 현장 데이터가 없습니다.');
          return;
        }
        const payload = {
          type: 'rosenfilm_jobs',
          version: 1,
          exportedAt: new Date().toISOString(),
          jobs: savedJobs,
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const dateStr = new Date().toISOString().slice(0, 10);
        saveAs(blob, `현장데이터_${dateStr}.json`);
      }, [savedJobs]);

      const importJobs = useCallback((event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            const incoming = Array.isArray(data.jobs) ? data.jobs : (Array.isArray(data) ? data : null);
            if (!incoming) {
              alert('올바른 현장 데이터 파일이 아닙니다.');
              return;
            }
            const cleaned = incoming
              .filter(j => j && j.name && j.filmSize
                && typeof j.filmSize.width === 'number' && typeof j.filmSize.length === 'number'
                && Array.isArray(j.surfaces))
              .map(j => ({
                id: j.id || (Date.now().toString(36) + Math.random().toString(36).slice(2, 6)),
                name: String(j.name),
                savedAt: j.savedAt || new Date().toISOString(),
                filmSize: j.filmSize,
                rotationAllowed: j.rotationAllowed !== undefined ? j.rotationAllowed : true,
                surfaces: j.surfaces.map(s => ({
                  width: Number(s.width) || 0,
                  height: Number(s.height) || 0,
                  count: Math.max(1, Number(s.count) || 1),
                  label: s.label || '',
                  category: s.category || '',
                })),
              }));

            if (cleaned.length === 0) {
              alert('불러올 수 있는 현장 데이터가 없습니다.');
              return;
            }

            const existingNames = new Map(savedJobs.map(j => [j.name, j]));
            let addedCount = 0, overwrittenCount = 0;
            const merged = [...savedJobs];
            const toSave = [];
            cleaned.forEach(j => {
              const existing = existingNames.get(j.name);
              if (existing) {
                const finalJob = { ...j, id: existing.id };
                const idx = merged.findIndex(m => m.id === existing.id);
                merged[idx] = finalJob;
                toSave.push(finalJob);
                overwrittenCount++;
              } else {
                merged.push(j);
                existingNames.set(j.name, j);
                toSave.push(j);
                addedCount++;
              }
            });
            if (cloudStatus === 'connected') {
              toSave.forEach(j => cloudSaveJob(j));
            } else {
              setSavedJobs(merged);
            }
            alert(`${addedCount}개 추가됨${overwrittenCount > 0 ? `, ${overwrittenCount}개는 같은 이름으로 덮어씀` : ''}`);
          } catch (error) {
            console.error('현장 데이터 불러오기 오류:', error);
            alert('JSON 파일을 읽는 중 오류가 발생했습니다.');
          } finally {
            event.target.value = '';
          }
        };
        reader.readAsText(file);
      }, [savedJobs, cloudStatus, cloudSaveJob]);

      // ---- 자주 쓰는 사이즈 프리셋 ----
      // ---- 부위 프리셋 (시공 부위 하나를 통째로 저장/재사용) ----
      // 부위 그룹 전체(항목들의 가로/세로/수량/라벨)를 하나의 프리셋으로 저장해서,
      // 다음에 클릭 한 번으로 그 부위 전체를 다시 불러올 수 있게 한다.
      // ---- 프리셋 카테고리(대분류) 관리 ----
      const addPresetCategory = useCallback(() => {
        const name = window.prompt('새 카테고리 이름을 입력하세요 (예: 문, 창호, 붙박이장).');
        if (name === null) return;
        const trimmed = name.trim();
        if (!trimmed) {
          alert('이름을 입력해주세요.');
          return;
        }
        if (presetCategories.some(c => c.name === trimmed)) {
          alert('이미 같은 이름의 카테고리가 있습니다.');
          return;
        }
        const categoryData = { id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), name: trimmed };
        if (cloudStatus === 'connected') {
          cloudSavePresetCategory(categoryData);
        } else {
          setPresetCategories(prev => [...prev, categoryData]);
        }
      }, [presetCategories, cloudStatus, cloudSavePresetCategory]);

      const renamePresetCategory = useCallback((category) => {
        const name = window.prompt('카테고리 이름을 변경합니다.', category.name);
        if (name === null) return;
        const trimmed = name.trim();
        if (!trimmed) {
          alert('이름을 입력해주세요.');
          return;
        }
        const categoryData = { ...category, name: trimmed };
        if (cloudStatus === 'connected') {
          cloudSavePresetCategory(categoryData);
        } else {
          setPresetCategories(prev => prev.map(c => (c.id === category.id ? categoryData : c)));
        }
      }, [cloudStatus, cloudSavePresetCategory]);

      const deletePresetCategoryFn = useCallback((category) => {
        const count = groupPresets.filter(p => p.categoryId === category.id).length;
        const msg = count > 0
          ? `'${category.name}' 카테고리를 삭제할까요? 그 안에 있던 프리셋 ${count}개는 "${UNCATEGORIZED_PRESET}"으로 이동됩니다.`
          : `'${category.name}' 카테고리를 삭제할까요?`;
        if (!window.confirm(msg)) return;

        if (cloudStatus === 'connected') {
          cloudDeletePresetCategory(category.id);
          groupPresets
            .filter(p => p.categoryId === category.id)
            .forEach(p => cloudSaveGroupPreset({ ...p, categoryId: null }));
        } else {
          setPresetCategories(prev => prev.filter(c => c.id !== category.id));
          setGroupPresets(prev => prev.map(p => (p.categoryId === category.id ? { ...p, categoryId: null } : p)));
        }
      }, [groupPresets, cloudStatus, cloudDeletePresetCategory, cloudSaveGroupPreset]);

      // 프리셋을 저장할 카테고리를 선택(또는 새로 생성)하도록 안내한다.
      const pickPresetCategoryId = useCallback(() => {
        if (presetCategories.length === 0) {
          const create = window.confirm('아직 만들어진 카테고리가 없습니다. 새 카테고리를 만드시겠습니까?\n(취소하면 미분류로 저장됩니다)');
          if (!create) return null;
          const name = window.prompt('새 카테고리 이름을 입력하세요 (예: 문, 창호, 붙박이장).');
          if (!name || !name.trim()) return null;
          const trimmed = name.trim();
          const categoryData = { id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), name: trimmed };
          if (cloudStatus === 'connected') {
            cloudSavePresetCategory(categoryData);
          } else {
            setPresetCategories(prev => [...prev, categoryData]);
          }
          return categoryData.id;
        }

        const listText = presetCategories.map((c, i) => `${i + 1}. ${c.name}`).join('\n');
        const input = window.prompt(
          `저장할 카테고리 번호를 입력하세요.\n${listText}\n\n(새 카테고리를 만들려면 이름을 직접 입력하세요. 비워두면 미분류)`
        );
        if (input === null) return undefined; // 취소
        const trimmedInput = input.trim();
        if (!trimmedInput) return null; // 미분류

        const asNumber = Number(trimmedInput);
        if (Number.isInteger(asNumber) && asNumber >= 1 && asNumber <= presetCategories.length) {
          return presetCategories[asNumber - 1].id;
        }

        // 번호가 아니면 이름으로 처리 (기존 이름이면 그 카테고리, 아니면 새로 생성)
        const existing = presetCategories.find(c => c.name === trimmedInput);
        if (existing) return existing.id;

        const categoryData = { id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), name: trimmedInput };
        if (cloudStatus === 'connected') {
          cloudSavePresetCategory(categoryData);
        } else {
          setPresetCategories(prev => [...prev, categoryData]);
        }
        return categoryData.id;
      }, [presetCategories, cloudStatus, cloudSavePresetCategory]);

      const saveGroupAsPreset = useCallback((cat) => {
        const itemsInCat = surfaces.filter(s => ((s.category || '').trim() || UNCATEGORIZED) === cat);
        if (itemsInCat.length === 0) return;

        const defaultName = cat === UNCATEGORIZED ? '' : cat;
        const name = window.prompt('이 부위를 저장할 프리셋 이름을 입력하세요.', defaultName);
        if (name === null) return;
        const trimmed = name.trim();
        if (!trimmed) {
          alert('이름을 입력해주세요.');
          return;
        }

        const categoryId = pickPresetCategoryId();
        if (categoryId === undefined) return; // 카테고리 선택 중 취소

        const existing = groupPresets.find(p => p.name === trimmed);
        if (existing && !window.confirm(`'${trimmed}' 프리셋이 이미 있습니다. 덮어쓸까요?`)) return;

        const presetData = {
          id: existing ? existing.id : Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          name: trimmed,
          categoryId: categoryId || null,
          items: itemsInCat.map(s => ({
            width: s.width, height: s.height, count: s.count, label: s.label,
          })),
        };

        if (cloudStatus === 'connected') {
          cloudSaveGroupPreset(presetData);
        } else {
          setGroupPresets(existing
            ? groupPresets.map(p => (p.id === existing.id ? presetData : p))
            : [...groupPresets, presetData]);
        }
        alert(`'${trimmed}' 프리셋으로 저장되었습니다.`);
      }, [surfaces, groupPresets, cloudStatus, cloudSaveGroupPreset, pickPresetCategoryId]);

      const deleteGroupPreset = useCallback((id, name) => {
        if (!window.confirm(`'${name}' 프리셋을 삭제할까요?`)) return;
        if (cloudStatus === 'connected') {
          cloudDeleteGroupPreset(id);
        } else {
          setGroupPresets(prev => prev.filter(p => p.id !== id));
        }
      }, [cloudStatus, cloudDeleteGroupPreset]);

      // 프리셋을 새 부위로 시공 면적 목록에 통째로 추가
      const applyGroupPreset = useCallback((preset) => {
        const existingCats = new Set(surfaces.map(s => (s.category || '').trim() || UNCATEGORIZED));
        let finalName = preset.name;
        let suffix = 2;
        while (existingCats.has(finalName)) {
          finalName = `${preset.name} ${suffix}`;
          suffix++;
        }

        const newItems = preset.items.map(it => ({
          width: it.width, height: it.height, count: it.count, label: it.label || '', category: finalName,
        }));

        setSurfaces(prev => {
          const isEmptyOnly = prev.length === 1 && !prev[0].width && !prev[0].height && !prev[0].label && !prev[0].category;
          return isEmptyOnly ? newItems : [...prev, ...newItems];
        });
        setCollapsedCats(prev => ({ ...prev, [finalName]: false }));
        setScrollTarget(finalName);
      }, [surfaces]);

      // ---- 부위 프리셋 JSON 내보내기 / 불러오기 (구글드라이브 등 클라우드 공유용) ----
      const groupPresetFileInputRef = useRef(null);

      const exportGroupPresets = useCallback(() => {
        if (groupPresets.length === 0) {
          alert('내보낼 프리셋이 없습니다.');
          return;
        }
        const payload = {
          type: 'rosenfilm_group_presets',
          version: 2,
          exportedAt: new Date().toISOString(),
          presetCategories,
          groupPresets,
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const dateStr = new Date().toISOString().slice(0, 10);
        saveAs(blob, `부위프리셋_${dateStr}.json`);
      }, [groupPresets, presetCategories]);

      const importGroupPresets = useCallback((event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            const incoming = Array.isArray(data.groupPresets) ? data.groupPresets : (Array.isArray(data) ? data : null);
            if (!incoming) {
              alert('올바른 부위 프리셋 파일이 아닙니다.');
              return;
            }

            // 카테고리 먼저 병합 (이름이 같으면 기존 카테고리를 재사용, id는 새로 매핑)
            const incomingCategories = Array.isArray(data.presetCategories) ? data.presetCategories : [];
            const categoryIdMap = {}; // 가져온 파일의 기존 categoryId -> 이 브라우저에서 쓸 categoryId
            const categoriesByName = new Map(presetCategories.map(c => [c.name, c]));
            const newCategories = [];
            incomingCategories.forEach(c => {
              if (!c || !c.name) return;
              const existingCat = categoriesByName.get(c.name);
              if (existingCat) {
                categoryIdMap[c.id] = existingCat.id;
              } else {
                const newCat = { id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), name: c.name };
                categoryIdMap[c.id] = newCat.id;
                categoriesByName.set(c.name, newCat);
                newCategories.push(newCat);
              }
            });

            const cleaned = incoming
              .filter(p => p && p.name && Array.isArray(p.items) && p.items.length > 0)
              .map(p => ({
                id: p.id || (Date.now().toString(36) + Math.random().toString(36).slice(2, 6)),
                name: String(p.name),
                categoryId: p.categoryId ? (categoryIdMap[p.categoryId] || null) : null,
                items: p.items
                  .filter(it => it && Number(it.width) > 0 && Number(it.height) > 0)
                  .map(it => ({
                    width: Number(it.width),
                    height: Number(it.height),
                    count: Math.max(1, Number(it.count) || 1),
                    label: it.label || '',
                  })),
              }))
              .filter(p => p.items.length > 0);

            if (cleaned.length === 0) {
              alert('불러올 수 있는 프리셋이 없습니다.');
              return;
            }

            const existingNames = new Map(groupPresets.map(p => [p.name, p]));
            const merged = [...groupPresets];
            const toSave = [];
            let addedCount = 0, overwrittenCount = 0;
            cleaned.forEach(p => {
              const existing = existingNames.get(p.name);
              if (existing) {
                const finalPreset = { ...p, id: existing.id };
                const idx = merged.findIndex(m => m.id === existing.id);
                merged[idx] = finalPreset;
                toSave.push(finalPreset);
                overwrittenCount++;
              } else {
                merged.push(p);
                existingNames.set(p.name, p);
                toSave.push(p);
                addedCount++;
              }
            });

            if (cloudStatus === 'connected') {
              newCategories.forEach(c => cloudSavePresetCategory(c));
              toSave.forEach(p => cloudSaveGroupPreset(p));
            } else {
              if (newCategories.length > 0) setPresetCategories(prev => [...prev, ...newCategories]);
              setGroupPresets(merged);
            }
            alert(`${addedCount}개 추가됨${overwrittenCount > 0 ? `, ${overwrittenCount}개는 같은 이름으로 덮어씀` : ''}`);
          } catch (error) {
            console.error('부위 프리셋 불러오기 오류:', error);
            alert('JSON 파일을 불러오는 중 오류가 발생했습니다.');
          } finally {
            event.target.value = '';
          }
        };
        reader.readAsText(file);
      }, [groupPresets, presetCategories, cloudStatus, cloudSaveGroupPreset, cloudSavePresetCategory]);


      const adjustToCuttingUnit = useCallback((width, height) => ({
        width: Math.ceil(width / 10) * 10,
        height: Math.ceil(height / 50) * 50,
      }), []);

      const addSurface = useCallback((presetCategory) => {
        const last = surfaces[surfaces.length - 1] || { width: 0, height: 0, count: 1, label: '', category: '' };
        const adjusted = adjustToCuttingUnit(last.width, last.height);
        setSurfaces(prev => [...prev, {
          width: adjusted.width,
          height: adjusted.height,
          count: last.count,
          label: last.label,
          category: presetCategory !== undefined ? presetCategory : (last.category || ''),
        }]);
        if (presetCategory) {
          setCollapsedCats(prev => ({ ...prev, [presetCategory]: false }));
          setScrollTarget(presetCategory);
        }
      }, [surfaces, adjustToCuttingUnit]);

      const handleInputBlur = useCallback((index, field, value) => {
        const newSurfaces = [...surfaces];
        if (field === 'count') {
          newSurfaces[index].count = Math.max(1, Number(value) || 1);
        } else if (field === 'label' || field === 'category') {
          newSurfaces[index][field] = value;
        } else {
          newSurfaces[index][field] = Number(value) || 0;
          const adjusted = adjustToCuttingUnit(newSurfaces[index].width, newSurfaces[index].height);
          newSurfaces[index].width = adjusted.width;
          newSurfaces[index].height = adjusted.height;
        }
        setSurfaces(newSurfaces);
      }, [surfaces, adjustToCuttingUnit]);

      // 개별 항목 하나의 폭(10mm 단위) 또는 세로(50mm 단위)를 늘리거나 줄인다.
      const adjustSurfaceDimension = useCallback((index, field, delta) => {
        const minValue = field === 'width' ? 10 : 50;
        setSurfaces(prev => prev.map((s, i) => (
          i === index ? { ...s, [field]: Math.max(minValue, (Number(s[field]) || 0) + delta) } : s
        )));
      }, []);

      // ---- 샷시 입력 행 관리 ----
      const addShashiRow = useCallback(() => {
        setShashiRows(prev => [...prev, { type: '3피스', width: '', height: '', singleQty: '', doubleQty: '', label: '' }]);
      }, []);

      const removeShashiRow = useCallback((index) => {
        setShashiRows(prev => prev.filter((_, i) => i !== index));
      }, []);

      const updateShashiRow = useCallback((index, field, value) => {
        setShashiRows(prev => prev.map((r, i) => (i === index ? { ...r, [field]: value } : r)));
      }, []);

      const addShashiExtra = useCallback(() => {
        setShashiExtras(prev => [...prev, { width: '', length: '', label: '' }]);
      }, []);

      const removeShashiExtra = useCallback((index) => {
        setShashiExtras(prev => prev.filter((_, i) => i !== index));
      }, []);

      const updateShashiExtra = useCallback((index, field, value) => {
        setShashiExtras(prev => prev.map((r, i) => (i === index ? { ...r, [field]: value } : r)));
      }, []);

      // 샷시 타입별 계수: 다대(H)/중간(I)/폭3(J)/폭4(K)는 "세로" 길이에, 머리(M)는 "가로" 길이에
      // 비례한다. 단창 1개당 계수 x1배, 이중창 1개당 계수 x2배가 적용된다(이중창은 재료가
      // 두 배 필요). 3피스는 다대/중간/폭3/폭4가 전부 동일 계수(2)이고, 2피스 계열(전창/반창/
      // 쪽창)은 다대/폭3/폭4가 1배, 중간만 2배로 서로 다르다. (첨부 엑셀 수식을 그대로 검증해서
      // 반영한 계수입니다.)
      const SHASHI_TYPE_COEFF = {
        '3피스': { daedae: 2, jungan: 2, w3: 2, w4: 2, meori: 2 },
        '2피스 전창': { daedae: 1, jungan: 2, w3: 1, w4: 1, meori: 2 },
        '2피스 반창': { daedae: 1, jungan: 2, w3: 1, w4: 1, meori: 2 },
        '2피스 쪽창': { daedae: 1, jungan: 2, w3: 1, w4: 1, meori: 2 },
      };
      const SHASHI_TYPES = Object.keys(SHASHI_TYPE_COEFF);

      // ---- 샷시+기타항목 → 폭별 필요 길이 집계 → 롤컷 레인 배분까지 한 번에 계산 ----
      // 필름 폭(1220mm) 안에 서로 다른 폭 여러 개를 나란히 조합해서 한 번에 세로로 길게
      // 롤컷한다(김밥 썰듯이). 반드시 한 번의 롤컷으로 모든 폭을 동시에 처리해야 하므로,
      // 폭 전체를 한 그룹으로 묶어서 레인 수(나란히 몇 줄)를 계산한다.
      const calculateRollCut = useCallback(() => {
        // 1) 샷시 입력 + 기타 항목(걸레받이/몰딩 등)을 폭별 필요 길이(m)로 집계한다.
        const totals = { frame: 0, daedae: 0, jungan: 0, w3: 0, w4: 0, meori: 0 };

        shashiRows.forEach(row => {
          const W = Number(row.width) || 0;
          const H = Number(row.height) || 0;
          const Qs = Number(row.singleQty) || 0;
          const Qd = Number(row.doubleQty) || 0;
          if (W <= 0 || H <= 0 || (Qs === 0 && Qd === 0)) return;

          const coeff = SHASHI_TYPE_COEFF[row.type] || SHASHI_TYPE_COEFF['3피스'];
          const qtyFactor = Qs + 2 * Qd; // 이중창은 단창의 2배만큼 재료가 필요

          totals.daedae += (coeff.daedae * H / 1000) * qtyFactor;
          totals.jungan += (coeff.jungan * H / 1000) * qtyFactor;
          totals.w3 += (coeff.w3 * H / 1000) * qtyFactor;
          totals.w4 += (coeff.w4 * H / 1000) * qtyFactor;
          totals.meori += (coeff.meori * W / 1000) * qtyFactor;

          // 틀(테두리)은 단창/이중창 구분 없이 창 하나당 둘레 길이만큼 1배로 필요하다.
          const perimeter = (W + H) * 2 / 1000;
          totals.frame += perimeter * (Qs + Qd);
        });

        const hasExtras = shashiExtras.some(ex => Number(ex.width) > 0 && Number(ex.length) > 0);
        const totalsSum = totals.frame + totals.daedae + totals.jungan + totals.w3 + totals.w4 + totals.meori;
        if (totalsSum === 0 && !hasExtras) {
          alert('샷시 사이즈(가로/세로)와 수량, 또는 기타 항목(폭/필요 길이)을 입력해주세요.');
          return;
        }

        // 같은 폭끼리는 하나로 합쳐서 정리한다(예: 틀폭과 머리폭이 우연히 같은 값이면 합산).
        const widthMap = new Map();
        const addToMap = (width, length, label) => {
          if (width <= 0 || length <= 0.0001) return;
          if (!widthMap.has(width)) widthMap.set(width, { length: 0, labels: [] });
          const entry = widthMap.get(width);
          entry.length += length;
          if (!entry.labels.includes(label)) entry.labels.push(label);
        };

        addToMap(Number(shashiWidths.frame) || 0, totals.frame, '틀');
        addToMap(Number(shashiWidths.daedae) || 0, totals.daedae, '다대');
        addToMap(Number(shashiWidths.jungan) || 0, totals.jungan, '중간');
        addToMap(Number(shashiWidths.w3) || 0, totals.w3, '폭3');
        addToMap(Number(shashiWidths.w4) || 0, totals.w4, '폭4');
        addToMap(Number(shashiWidths.meori) || 0, totals.meori, '머리');
        shashiExtras.forEach(ex => {
          addToMap(Number(ex.width) || 0, Number(ex.length) || 0, ex.label || '기타');
        });

        const rawItems = Array.from(widthMap.entries())
          .map(([width, { length, labels }]) => ({ width, length, label: labels.join('+') }));

        // 2) 집계된 폭 목록으로 롤컷 레인 배분(언덕오르기 탐색)을 계산한다.
        const oversized = rawItems.filter(it => it.width > filmSize.width);
        const packable = rawItems.filter(it => it.width <= filmSize.width);

        if (packable.length === 0) {
          setRollCutResult(null);
          if (oversized.length > 0) alert('입력한 폭이 모두 필름 폭보다 넓어서 롤컷할 수 없습니다.');
          return;
        }

        const baseWidthSum = packable.reduce((sum, it) => sum + it.width, 0);
        if (baseWidthSum > filmSize.width) {
          alert(
            `입력한 폭을 전부 합치면(${baseWidthSum}mm) 필름 폭(${filmSize.width}mm)을 넘어서, ` +
            `한 번에 같이 롤컷할 수 없습니다. 항목 수를 줄이거나 폭을 조정해주세요.`
          );
          setRollCutResult(null);
          return;
        }

        // 로스 = "남는 길이로 인한 면적" + "안 쓰는 폭으로 인한 면적". 예전엔 폭 낭비에 더 큰
        // 가중치(x3)를 줬는데, 그러면 폭이 넓은 항목 하나가 억지로 레인을 더 배정받아서
        // 필요량 대비 몇 배씩 초과 생산되는 부작용이 있었다. 폭 낭비와 길이 낭비를 동일한
        // 가중치로 두면, 특정 항목에 로스가 몰리지 않고 훨씬 균형 잡힌 결과가 나온다.
        const WIDTH_WASTE_WEIGHT = 1;

        const evalLanes = (laneCounts) => {
          const usedWidth = packable.reduce((sum, it, i) => sum + it.width * laneCounts[i], 0);
          if (usedWidth > filmSize.width) return null;
          const rawRunLength = Math.max(...packable.map((it, i) => it.length / laneCounts[i]));
          const runLength = Math.ceil(rawRunLength * 10) / 10;
          const leftoverWidth = filmSize.width - usedWidth;
          let wasteArea = leftoverWidth * runLength * WIDTH_WASTE_WEIGHT;
          packable.forEach((it, i) => {
            wasteArea += (runLength * laneCounts[i] - it.length) * it.width;
          });
          return { laneCounts: [...laneCounts], usedWidth, leftoverWidth, runLength, wasteArea };
        };

        // 언덕오르기(hill climbing) 탐색: 레인 수를 하나씩 늘리거나(+1) 줄여서(-1, 최소 1) 로스가
        // 가장 많이 줄어드는 쪽으로 반복 이동한다. 한 번의 증가 방향만 보면 막다른 지역해에
        // 갇힐 수 있어서, 감소도 함께 허용하고 여러 시작점에서 반복 탐색한 뒤 가장 좋은 결과를
        // 채택한다(다중 시작점 언덕오르기).
        // 두 후보의 우열을 비교한다: 1차로 로스(면적)가 적은 쪽, 로스가 사실상 같으면(동점)
        // 폭을 더 많이 쓰는 쪽을 우선한다. (로스 점수는 같은데 폭만 남기는 경우가 있어서,
        // 그런 무승부 상황에서는 남는 폭을 최대한 줄이는 쪽으로 결정한다.)
        const isBetter = (a, b) => {
          if (a.wasteArea < b.wasteArea - 1e-6) return true;
          if (a.wasteArea > b.wasteArea + 1e-6) return false;
          return a.usedWidth > b.usedWidth;
        };

        const hillClimb = (startLaneCounts) => {
          let current = evalLanes(startLaneCounts);
          if (!current) return null;
          let improved = true;
          let safetyCounter = 0;
          while (improved && safetyCounter < 3000) {
            improved = false;
            safetyCounter++;
            let localBest = null;
            packable.forEach((it, i) => {
              [1, -1].forEach(delta => {
                const trial = [...current.laneCounts];
                trial[i] += delta;
                if (trial[i] < 1) return;
                const candidate = evalLanes(trial);
                if (candidate && (!localBest || isBetter(candidate, localBest))) {
                  localBest = candidate;
                }
              });
            });
            if (localBest && isBetter(localBest, current)) {
              current = localBest;
              improved = true;
            }
          }
          return current;
        };

        const totalLength = packable.reduce((sum, it) => sum + it.length, 0);
        const maxLaneForNarrowest = Math.floor(filmSize.width / Math.min(...packable.map(it => it.width)));

        // 여러 시작점을 준비한다: 전부 1개씩, 필요 길이 비율로 여러 배율(N) 시도, 약간의
        // 무작위 시작점까지 섞어서 지역해에 갇히는 걸 방지한다.
        const seeds = [packable.map(() => 1)];
        const nStep = Math.max(1, Math.floor(Math.min(maxLaneForNarrowest * packable.length, 200) / 30));
        for (let n = packable.length; n <= Math.min(maxLaneForNarrowest * packable.length, 200); n += nStep) {
          seeds.push(packable.map(it => Math.max(1, Math.round(n * (it.length / totalLength)))));
        }
        let seedRandom = 12345; // 결과 재현을 위한 간단한 시드 난수
        const nextRandom = () => {
          seedRandom = (seedRandom * 1103515245 + 12345) & 0x7fffffff;
          return seedRandom / 0x7fffffff;
        };
        for (let i = 0; i < 20; i++) {
          seeds.push(packable.map(() => 1 + Math.floor(nextRandom() * maxLaneForNarrowest)));
        }

        let best = null;
        seeds.forEach(seed => {
          const result = hillClimb(seed);
          if (result && (!best || isBetter(result, best))) {
            best = result;
          }
        });

        if (!best) {
          alert('가능한 조합을 찾지 못했습니다. 폭 구성을 확인해주세요.');
          setRollCutResult(null);
          return;
        }

        const items = packable.map((it, i) => {
          const count = best.laneCounts[i];
          const totalProduced = best.runLength * count;
          return {
            width: it.width,
            label: it.label,
            requiredLength: it.length,
            count,
            totalProduced,
            surplus: totalProduced - it.length,
          };
        });

        setRollCutResult({
          runLength: best.runLength,
          usedWidth: best.usedWidth,
          leftoverWidth: best.leftoverWidth,
          items,
          oversized,
        });
      }, [shashiRows, shashiExtras, shashiWidths, filmSize.width]);

      // ---- 행(가로 전체 컷) 기반 배치 알고리즘 (여러 롤 자동 추가 지원) ----
      // 실제 작업 편의를 위해, 가로 컷은 항상 필름 전체 폭을 한 번에 자르는 방식으로 고정한다.
      // 한 롤(50m 또는 25m)에 다 안 들어가면, 같은 규격의 롤을 하나 더 꺼내서 이어서 배치한다.
      // 재단 순서 원칙: 세로(길이)가 가장 긴 조각부터, 같은 길이면 가로(폭)가 넓은 것부터 자른다.
      const optimizeCutting = useCallback(() => {
        const items = surfaces.flatMap(s =>
          Array(s.count).fill(0).map(() => ({
            width: s.width,
            height: s.height,
            label: s.label,
          }))
        );

        // 필름 폭보다 커서 회전해도 못 들어가거나, 어느 방향으로도 롤 길이 자체를 넘어서는
        // (롤을 몇 개를 더 꺼내도 절대 불가능한) 조각만 사전에 걸러서 사용자에게 알린다.
        const oversized = items.filter(it => {
          const fitsWidthNormal = it.width <= filmSize.width;
          const fitsWidthRotated = rotationAllowed && it.height <= filmSize.width;
          const fitsNormal = fitsWidthNormal && it.height <= filmSize.length;
          const fitsRotated = fitsWidthRotated && it.width <= filmSize.length;
          return !fitsNormal && !fitsRotated;
        });
        const packable = items.filter(it => !oversized.includes(it));

        // 재단 순서 원칙: 세로(길이)가 가장 긴 조각부터, 같은 길이면 가로(폭)가 넓은 것부터 자른다.
        // 이 순서대로 배치되므로 결과의 번호(#1, #2...)도 이 순서를 따른다.
        packable.sort((a, b) => (b.height - a.height) || (b.width - a.width));

        const layout = [];
        let rollIndex = 1;
        let rows = []; // 현재 롤의 행 목록. 각 행: { y, height, usedWidth }

        for (const item of packable) {
          // 기존 행들 중, 그 조각을 넣었을 때 실제로 낭비되는 "면적"(폭 × 세로로 남는 여백)이
          // 가장 적은 행을 최우선으로 선택한다.
          let bestRowIdx = -1, bestRotated = false, bestWastedArea = null, bestWidthLeftover = null;

          rows.forEach((row, idx) => {
            const remainingWidth = filmSize.width - row.usedWidth;

            const consider = (w, h, rotated) => {
              if (w > remainingWidth || h > row.height) return;
              const wastedArea = w * (row.height - h);
              const widthLeftover = remainingWidth - w;
              const better = bestWastedArea === null
                || wastedArea < bestWastedArea
                || (wastedArea === bestWastedArea && widthLeftover < bestWidthLeftover);
              if (better) {
                bestWastedArea = wastedArea;
                bestWidthLeftover = widthLeftover;
                bestRowIdx = idx;
                bestRotated = rotated;
              }
            };

            consider(item.width, item.height, false);
            if (rotationAllowed) consider(item.height, item.width, true);
          });

          if (bestRowIdx !== -1) {
            const row = rows[bestRowIdx];
            const w = bestRotated ? item.height : item.width;
            const h = bestRotated ? item.width : item.height;
            layout.push({
              x: row.usedWidth, y: row.y,
              width: w, height: h,
              rotated: bestRotated, label: item.label,
              id: layout.length + 1,
              roll: rollIndex,
            });
            row.usedWidth += w;
            continue;
          }

          // 현재 롤의 기존 행 어디에도 못 들어가면, 현재 롤에 새 행(가로 전체 컷)을 열어본다.
          let w = item.width, h = item.height, rotated = false;
          if (w > filmSize.width && rotationAllowed) {
            w = item.height; h = item.width; rotated = true;
          }
          let newY = rows.length ? rows[rows.length - 1].y + rows[rows.length - 1].height : 0;

          if (!(w <= filmSize.width && newY + h <= filmSize.length)) {
            // 현재 롤에 새 행조차 못 열면, 같은 규격의 롤을 하나 더 꺼내서 처음부터 다시 쌓는다.
            // (오버사이즈 필터를 이미 통과했으므로, 새 롤에서는 반드시 첫 행으로 들어갈 수 있다.)
            rollIndex += 1;
            rows = [];
            newY = 0;
          }

          rows.push({ y: newY, height: h, usedWidth: w });
          layout.push({
            x: 0, y: newY,
            width: w, height: h,
            rotated, label: item.label,
            id: layout.length + 1,
            roll: rollIndex,
          });
        }

        const rollCount = layout.length ? Math.max(...layout.map(it => it.roll)) : 0;
        const rollUsedLengths = Array.from({ length: rollCount }, (_, i) => {
          const rollItems = layout.filter(it => it.roll === i + 1);
          return rollItems.length ? Math.max(...rollItems.map(it => it.y + it.height)) : 0;
        });

        const usedFilm = layout.reduce((sum, it) => sum + it.width * it.height, 0);
        const totalFilmArea = rollCount * filmSize.width * filmSize.length;
        const waste = totalFilmArea > 0 ? ((totalFilmArea - usedFilm) / totalFilmArea * 100).toFixed(2) : '0.00';

        setResult({
          usedFilm: usedFilm / 1000000,
          waste,
          layout,
          rollCount,
          rollUsedLengths,
          unplacedCount: oversized.length,
          unplacedItems: oversized,
        });
      }, [surfaces, filmSize, rotationAllowed]);

      useEffect(() => {
        if (result && result.rollCount > 0) {
          const scale = 0.2;
          const urls = [];

          for (let rollNum = 1; rollNum <= result.rollCount; rollNum++) {
            const canvas = canvasRefs.current[rollNum - 1];
            if (!canvas) continue;
            const ctx = canvas.getContext('2d');
            const rollLength = result.rollUsedLengths[rollNum - 1] || filmSize.length;

            canvas.width = filmSize.width * scale;
            canvas.height = Math.max(Math.min(rollLength, filmSize.length) * scale, 100);

            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            result.layout.filter(item => item.roll === rollNum).forEach(item => {
              const x = item.x * scale, y = item.y * scale, w = item.width * scale, h = item.height * scale;

              ctx.fillStyle = `hsl(${item.id * 30}, 70%, 50%)`;
              ctx.fillRect(x, y, w, h);
              ctx.strokeStyle = '#000';
              ctx.strokeRect(x, y, w, h);

              // 좁은 조각끼리 붙어있으면 텍스트가 옆 조각까지 삐져나와 겹쳐 보일 수 있어서,
              // 이 조각 영역 안으로만 그려지도록 잘라낸다(clip).
              ctx.save();
              ctx.beginPath();
              ctx.rect(x, y, w, h);
              ctx.clip();

              ctx.font = `${fontSize}px Arial`;
              ctx.fillStyle = '#fff';
              ctx.strokeStyle = '#000';
              ctx.textAlign = 'left';
              ctx.textBaseline = 'middle';

              ctx.translate(x + Math.min(20, w / 2), y + h - 8);
              ctx.rotate(-Math.PI / 2);
              const rotMark = item.rotated ? ' [회전]' : '';
              const idText = `#${item.id} (${item.width}x${item.height})${rotMark}`;
              ctx.strokeText(idText, 0, 0);
              ctx.fillText(idText, 0, 0);
              if (item.label) {
                const labelText = item.label.slice(0, 20);
                ctx.strokeText(labelText, 0, fontSize * 4);
                ctx.fillText(labelText, 0, fontSize * 4);
              }
              ctx.restore();
            });

            urls.push(canvas.toDataURL('image/png'));
          }

          setPrintImageUrls(urls);
        }
      }, [result, filmSize, fontSize]);

      const printPdf = useCallback(() => {
        if (!result) {
          alert('먼저 재단 최적화를 실행해주세요.');
          return;
        }
        window.print();
      }, [result]);

      const saveResult = useCallback(() => {
        const blob = new Blob([JSON.stringify({ filmSize, rotationAllowed, surfaces, result })], { type: 'application/json' });
        saveAs(blob, 'cutting_result.json');
      }, [filmSize, rotationAllowed, surfaces, result]);

      const loadResult = useCallback((event) => {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const data = JSON.parse(e.target.result);
              setFilmSize(data.filmSize);
              if (data.rotationAllowed !== undefined) setRotationAllowed(data.rotationAllowed);
              setSurfaces((Array.isArray(data.surfaces) ? data.surfaces : []).map(s => {
                const adjusted = adjustToCuttingUnit(Number(s.width) || 0, Number(s.height) || 0);
                return {
                  width: adjusted.width,
                  height: adjusted.height,
                  count: Math.max(1, Number(s.count) || 1),
                  label: s.label || '',
                  category: s.category || '',
                };
              }));
              setResult(data.result || null);
            } catch (error) {
              console.error('JSON load error:', error);
              alert('JSON 파일을 불러오는 중 오류가 발생했습니다.');
            }
          };
          reader.readAsText(file);
        }
      }, [adjustToCuttingUnit]);

      // ---- 샷시 롤컷 계산 결과 저장/불러오기 ----
      const shashiFileInputRef = useRef(null);

      const saveShashiResult = useCallback(() => {
        const blob = new Blob(
          [JSON.stringify({ shashiWidths, shashiRows, shashiExtras, rollCutResult })],
          { type: 'application/json' }
        );
        saveAs(blob, 'shashi_rollcut_result.json');
      }, [shashiWidths, shashiRows, shashiExtras, rollCutResult]);

      const loadShashiResult = useCallback((event) => {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const data = JSON.parse(e.target.result);
              if (data.shashiWidths) {
                setShashiWidths({
                  frame: String(data.shashiWidths.frame ?? '100'),
                  daedae: String(data.shashiWidths.daedae ?? '170'),
                  jungan: String(data.shashiWidths.jungan ?? '120'),
                  w3: String(data.shashiWidths.w3 ?? '70'),
                  w4: String(data.shashiWidths.w4 ?? '50'),
                  meori: String(data.shashiWidths.meori ?? '100'),
                });
              }
              if (Array.isArray(data.shashiRows) && data.shashiRows.length > 0) {
                setShashiRows(data.shashiRows.map(r => ({
                  type: r.type || '3피스',
                  width: r.width !== undefined ? String(r.width) : '',
                  height: r.height !== undefined ? String(r.height) : '',
                  singleQty: r.singleQty !== undefined ? String(r.singleQty) : '',
                  doubleQty: r.doubleQty !== undefined ? String(r.doubleQty) : '',
                  label: r.label || '',
                })));
              }
              if (Array.isArray(data.shashiExtras) && data.shashiExtras.length > 0) {
                setShashiExtras(data.shashiExtras.map(ex => ({
                  width: ex.width !== undefined ? String(ex.width) : '',
                  length: ex.length !== undefined ? String(ex.length) : '',
                  label: ex.label || '',
                })));
              }
              setRollCutResult(data.rollCutResult || null);
            } catch (error) {
              console.error('JSON load error:', error);
              alert('JSON 파일을 불러오는 중 오류가 발생했습니다.');
            }
          };
          reader.readAsText(file);
        }
      }, []);

      // ---- 저장된 결과(클라우드/브라우저 저장소) — 재단 최적화 + 롤컷 계산 공용 ----
      const saveCuttingResultToStore = useCallback(async () => {
        if (!result) {
          alert('먼저 재단 최적화를 실행해주세요.');
          return;
        }
        const name = window.prompt('저장할 이름을 입력하세요 (예: 강남 OO아파트 재단결과)');
        if (!name || !name.trim()) return;
        const data = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          name: name.trim(),
          type: 'cutting',
          savedAt: new Date().toISOString(),
          payload: { filmSize, rotationAllowed, surfaces, result },
        };
        if (cloudStatus === 'connected') {
          const ok = await cloudSaveResult(data);
          if (ok) alert(`'${data.name}' 결과가 클라우드에 저장되었습니다.`);
          // 실패 시에는 cloudSaveResult 내부에서 이미 실패 사유를 알림으로 띄운다.
        } else {
          setSavedResults(prev => [...prev, data]);
          alert(`'${data.name}' 결과가 이 브라우저에 저장되었습니다. (클라우드 미연결)`);
        }
      }, [result, filmSize, rotationAllowed, surfaces, cloudStatus, cloudSaveResult]);

      const saveRollCutResultToStore = useCallback(async () => {
        if (!rollCutResult) {
          alert('먼저 롤컷 계산을 실행해주세요.');
          return;
        }
        const name = window.prompt('저장할 이름을 입력하세요 (예: 강남 OO아파트 롤컷결과)');
        if (!name || !name.trim()) return;
        const data = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          name: name.trim(),
          type: 'rollcut',
          savedAt: new Date().toISOString(),
          payload: { shashiWidths, shashiRows, shashiExtras, rollCutResult },
        };
        if (cloudStatus === 'connected') {
          const ok = await cloudSaveResult(data);
          if (ok) alert(`'${data.name}' 결과가 클라우드에 저장되었습니다.`);
        } else {
          setSavedResults(prev => [...prev, data]);
          alert(`'${data.name}' 결과가 이 브라우저에 저장되었습니다. (클라우드 미연결)`);
        }
      }, [rollCutResult, shashiWidths, shashiRows, shashiExtras, cloudStatus, cloudSaveResult]);

      const loadSavedResult = useCallback((item) => {
        if (!window.confirm(`'${item.name}' 결과를 불러오면 현재 화면의 입력값이 대체됩니다. 계속할까요?`)) return;
        const p = item.payload || {};
        if (item.type === 'cutting') {
          if (p.filmSize) setFilmSize(p.filmSize);
          if (p.rotationAllowed !== undefined) setRotationAllowed(p.rotationAllowed);
          if (Array.isArray(p.surfaces)) setSurfaces(p.surfaces);
          setResult(p.result || null);
        } else if (item.type === 'rollcut') {
          if (p.shashiWidths) setShashiWidths(p.shashiWidths);
          if (Array.isArray(p.shashiRows)) setShashiRows(p.shashiRows);
          if (Array.isArray(p.shashiExtras)) setShashiExtras(p.shashiExtras);
          setRollCutResult(p.rollCutResult || null);
          setShowRollCutCalc(true);
        }
      }, []);

      const deleteSavedResult = useCallback((item) => {
        if (!window.confirm(`'${item.name}' 결과를 삭제할까요?`)) return;
        if (cloudStatus === 'connected') {
          cloudDeleteResult(item.id);
        } else {
          setSavedResults(prev => prev.filter(r => r.id !== item.id));
        }
      }, [cloudStatus, cloudDeleteResult]);

      // 샷시 입력 행의 가로(10mm 단위)/세로(50mm 단위)를 늘리거나 줄인다.
      const adjustShashiRowDimension = useCallback((index, field, delta) => {
        const minValue = field === 'width' ? 10 : 50;
        setShashiRows(prev => prev.map((r, i) => (
          i === index
            ? { ...r, [field]: String(Math.max(minValue, (Number(r[field]) || 0) + delta)) }
            : r
        )));
      }, []);

      // 기타 항목의 폭(10mm 단위)/필요 길이(5m 단위)를 늘리거나 줄인다.
      const adjustShashiExtraDimension = useCallback((index, field, delta) => {
        const minValue = field === 'width' ? 10 : 5;
        setShashiExtras(prev => prev.map((r, i) => (
          i === index
            ? { ...r, [field]: String(Math.max(minValue, (Number(r[field]) || 0) + delta)) }
            : r
        )));
      }, []);

      // 롤컷 폭 설정(틀/다대/중간/폭3/폭4/머리)을 10mm 단위로 늘리거나 줄인다.
      const adjustShashiWidthSetting = useCallback((field, delta) => {
        setShashiWidths(prev => ({
          ...prev,
          [field]: String(Math.max(10, (Number(prev[field]) || 0) + delta)),
        }));
      }, []);

      // 부위(카테고리) 순서 계산: 처음 등장한 순서대로, 미분류는 항상 마지막
      const categoryOrder = [];
      surfaces.forEach(s => {
        const cat = (s.category || '').trim() || UNCATEGORIZED;
        if (!categoryOrder.includes(cat)) categoryOrder.push(cat);
      });
      if (categoryOrder.includes(UNCATEGORIZED)) {
        categoryOrder.splice(categoryOrder.indexOf(UNCATEGORIZED), 1);
        categoryOrder.push(UNCATEGORIZED);
      }

      // ---- 인쇄용 부위별 요약 + 총 소요량 계산 ----
      // (실제 재단 배치 결과가 아니라, 입력한 시공 면적 원본 기준의 필요 수량/면적 집계)
      const printSummary = categoryOrder.map(cat => {
        const items = surfaces.filter(s => ((s.category || '').trim() || UNCATEGORIZED) === cat);
        const rows = items.map(s => ({
          width: s.width,
          height: s.height,
          count: s.count,
          label: s.label,
          areaM2: (s.width * s.height * s.count) / 1000000,
        }));
        const subtotalCount = rows.reduce((sum, r) => sum + r.count, 0);
        const subtotalAreaM2 = rows.reduce((sum, r) => sum + r.areaM2, 0);
        return { cat, rows, subtotalCount, subtotalAreaM2 };
      }).filter(g => g.rows.length > 0);

      const totalRequiredCount = printSummary.reduce((sum, g) => sum + g.subtotalCount, 0);
      const totalRequiredAreaM2 = printSummary.reduce((sum, g) => sum + g.subtotalAreaM2, 0);

      // 부위별 요약 + 총 소요량을 사람이 읽기 쉬운 텍스트로 만들어 .txt 파일로 내보낸다.
      const exportSummaryAsText = () => {
        if (printSummary.length === 0) {
          alert('내보낼 시공 면적 데이터가 없습니다.');
          return;
        }
        const lines = [];
        lines.push('로젠필름 재단 치수 내역');
        lines.push(`현장명: ${jobName || '미지정'}`);
        lines.push(`생성일: ${new Date().toLocaleString('ko-KR')}`);
        lines.push(`필름 규격: 폭 ${filmSize.width}mm x 길이 ${filmSize.length / 1000}m`);
        lines.push('');

        printSummary.forEach(group => {
          lines.push(`[${group.cat}]`);
          group.rows.forEach(r => {
            const labelPart = r.label ? ` (${r.label})` : '';
            lines.push(`  ${r.width} x ${r.height}  x ${r.count}개${labelPart}   ${r.areaM2.toFixed(3)}㎡`);
          });
          lines.push(`  소계: ${group.subtotalCount}개, ${group.subtotalAreaM2.toFixed(3)}㎡`);
          lines.push('');
        });

        lines.push('-----------------------------');
        lines.push(`총 소요량: ${totalRequiredCount}개, ${totalRequiredAreaM2.toFixed(3)}㎡`);
        lines.push('* 위 면적은 낭비율을 반영하지 않은 순수 필요 면적입니다.');

        const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
        const dateStr = new Date().toISOString().slice(0, 10);
        const safeName = (jobName || '재단치수').replace(/[\\/:*?"<>|]/g, '_');
        saveAs(blob, `${safeName}_${dateStr}.txt`);
      };

      return (
        <div className="p-4 max-w-4xl mx-auto">
          <h1 className="text-2xl font-bold mb-4">로젠필름 재단 최적화</h1>

          <div className="mb-6 border rounded p-3 bg-cyan-50">
            <div className="flex flex-wrap items-center justify-between gap-2">
              <h2 className="text-lg font-semibold flex items-center gap-2">
                클라우드 동기화 (여러 기기 공유)
                {cloudStatus === 'connected' && (
                  <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">● 연결됨</span>
                )}
                {cloudStatus === 'connecting' && (
                  <span className="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">연결 중...</span>
                )}
                {cloudStatus === 'disconnected' && (
                  <span className="text-xs bg-gray-200 text-gray-600 px-2 py-0.5 rounded-full">연결 안 됨</span>
                )}
                {cloudStatus === 'error' && (
                  <span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">⚠ 오류</span>
                )}
              </h2>
              <button
                onClick={() => setShowCloudSettings(prev => !prev)}
                className="text-sm text-cyan-700 hover:underline"
              >
                {showCloudSettings ? '설정 접기' : '설정 열기'}
              </button>
            </div>

            {showCloudSettings && (
              <div className="mt-3">
                <p className="text-xs text-gray-600 mb-2 leading-relaxed">
                  1. 구글 Firebase 콘솔(firebase.google.com)에서 무료 프로젝트를 만들고 Firestore Database를 활성화합니다.<br />
                  2. 프로젝트 설정 → 일반 → "웹 앱 추가"에서 나오는 firebaseConfig 객체 전체를 아래에 붙여넣으세요.<br />
                  3. Firestore 규칙에서 읽기/쓰기를 허용해야 합니다(테스트 모드 또는 아래와 같은 간단한 규칙).<br />
                  4. 아래 "작업장 코드"를 같은 값으로 입력한 기기끼리 프리셋·현장 데이터가 실시간으로 공유됩니다.
                </p>
                <details className="mb-2 text-xs text-gray-600">
                  <summary className="cursor-pointer text-cyan-700">Firestore 보안 규칙 예시 (로그인 없이 코드만으로 공유)</summary>
                  <pre className="bg-gray-800 text-gray-100 p-2 rounded mt-1 overflow-auto">{`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /workspaces/{code}/{document=**} {
      allow read, write: if true;
    }
  }
}`}</pre>
                  <p className="mt-1">⚠️ 이 규칙은 작업장 코드만 알면 누구나 읽고 쓸 수 있습니다. 코드를 외부에 공유하지 마세요.</p>
                </details>
                <textarea
                  value={cloudConfigText}
                  onChange={(e) => setCloudConfigText(e.target.value)}
                  placeholder={'{\n  "apiKey": "...",\n  "authDomain": "...",\n  "projectId": "...",\n  "storageBucket": "...",\n  "messagingSenderId": "...",\n  "appId": "..."\n}'}
                  className="border p-2 w-full h-28 font-mono text-xs mb-2"
                />
                <div className="flex flex-wrap items-center gap-2">
                  <input
                    type="text"
                    placeholder="작업장 코드 (예: rozen-shop-01)"
                    value={workspaceCode}
                    onChange={(e) => setWorkspaceCode(e.target.value)}
                    className="border p-2 w-56"
                  />
                  <button onClick={connectCloud} className="bg-cyan-600 text-white p-2 rounded">
                    연결 / 재연결
                  </button>
                  {cloudStatus === 'connected' && (
                    <button onClick={disconnectCloud} className="bg-gray-400 text-white p-2 rounded">
                      연결 해제
                    </button>
                  )}
                </div>
                {cloudError && (
                  <p className="text-sm text-red-600 mt-2">{cloudError}</p>
                )}
              </div>
            )}

            {!showCloudSettings && cloudStatus === 'connected' && (
              <p className="text-xs text-gray-600 mt-1">
                작업장 코드 "{workspaceCode}"로 연결되어 프리셋·현장 데이터가 실시간으로 동기화됩니다.
              </p>
            )}
          </div>

          <div className="mb-6 border rounded p-3 bg-teal-50">
            <h2 className="text-lg font-semibold mb-2">저장된 결과 검색 (재단 최적화 + 롤컷 계산)</h2>
            <input
              type="text"
              placeholder="이름으로 검색..."
              value={resultSearchQuery}
              onChange={(e) => setResultSearchQuery(e.target.value)}
              className="border p-2 w-full mb-2"
            />
            {(() => {
              const filtered = savedResults
                .filter(r => r.name.toLowerCase().includes(resultSearchQuery.trim().toLowerCase()))
                .sort((a, b) => new Date(b.savedAt) - new Date(a.savedAt));
              if (savedResults.length === 0) {
                return <p className="text-sm text-gray-500">저장된 결과가 없습니다. 재단 최적화 또는 롤컷 계산 후 "결과 저장소에 저장" 버튼으로 등록하세요.</p>;
              }
              if (filtered.length === 0) {
                return <p className="text-sm text-gray-500">검색 결과가 없습니다.</p>;
              }
              return (
                <div className="flex flex-col gap-1">
                  {filtered.map(item => (
                    <div key={item.id} className="flex items-center justify-between bg-white border rounded px-3 py-1.5">
                      <div>
                        <span className={`text-xs px-1.5 py-0.5 rounded mr-2 ${item.type === 'cutting' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>
                          {item.type === 'cutting' ? '재단 최적화' : '롤컷 계산'}
                        </span>
                        <span className="font-medium">{item.name}</span>
                        <span className="text-gray-400 text-xs ml-2">
                          {new Date(item.savedAt).toLocaleString('ko-KR')}
                        </span>
                      </div>
                      <div className="flex gap-2">
                        <button onClick={() => loadSavedResult(item)} className="text-blue-600 text-sm hover:underline">
                          불러오기
                        </button>
                        <button onClick={() => deleteSavedResult(item)} className="text-red-600 text-sm hover:underline">
                          삭제
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              );
            })()}
            <p className="text-xs text-gray-500 mt-2">
              브라우저에 저장되며, 클라우드 동기화가 연결되어 있으면 여러 기기에서 실시간으로 공유됩니다.
            </p>
          </div>

          <div className="mb-4 flex flex-wrap gap-6 items-start">
            <div>
              <h2 className="text-lg font-semibold">필름 규격 (폭 1220mm)</h2>
              <select
                value={filmSize.length}
                onChange={(e) => setFilmSize({ ...filmSize, length: +e.target.value })}
                className="border p-2"
              >
                <option value={50000}>50m (50,000mm)</option>
                <option value={25000}>25m (25,000mm)</option>
              </select>
            </div>
            <div>
              <h2 className="text-lg font-semibold">회전 배치</h2>
              <label className="flex items-center gap-2 border p-2 rounded w-fit">
                <input
                  type="checkbox"
                  checked={rotationAllowed}
                  onChange={(e) => setRotationAllowed(e.target.checked)}
                />
                90도 회전 배치 허용
              </label>
              <p className="text-xs text-gray-500 mt-1">모든 조각에 공통 적용됩니다. 인쇄 방향이 고정된 필름이면 해제하세요.</p>
            </div>
          </div>

          <div className="mb-6 border rounded p-3 bg-orange-50">
            <div className="flex items-center justify-between">
              <h2 className="text-lg font-semibold">샷시 롤컷 계산기</h2>
              <button
                onClick={() => setShowRollCutCalc(prev => !prev)}
                className="text-sm text-orange-700 hover:underline"
              >
                {showRollCutCalc ? '접기' : '열기'}
              </button>
            </div>

            {showRollCutCalc && (
              <div className="mt-3">
                <p className="text-xs text-gray-600 mb-3 leading-relaxed">
                  좁고 긴 부위(샷시, 몰딩, 걸레받이 등)를 미리 필름 폭 1220mm 안에 여러 폭을 나란히 묶어서
