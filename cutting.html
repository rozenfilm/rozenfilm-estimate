            )}
            <p className="text-xs text-gray-500 mt-2">
              프리셋을 클릭하면 그 부위의 모든 항목(가로/세로/수량/라벨)이 통째로 새 부위로 추가됩니다. 브라우저에 저장되어 다음에 열 때도 유지됩니다.
              "프리셋 내보내기"로 JSON 파일을 저장해 구글드라이브 등에 올리면, 다른 PC에서 이 파일을 열고 "프리셋 불러오기"로 같은 목록을 가져올 수 있습니다.
            </p>
          </div>

          <div className="mb-4">
            <h2 className="text-lg font-semibold mb-2">시공 면적</h2>

            <datalist id="category-options">
              {categoryOrder.filter(c => c !== UNCATEGORIZED).map(c => <option key={c} value={c} />)}
            </datalist>

            {categoryOrder.length > 0 && (
              <div className="flex flex-wrap items-center gap-2 mb-3">
                {categoryOrder.map(cat => (
                  <button
                    key={cat}
                    onClick={() => jumpToCategory(cat)}
                    className="bg-white border border-blue-400 text-blue-700 text-sm px-3 py-1 rounded-full hover:bg-blue-50"
                  >
                    {cat} ({surfaces.filter(s => ((s.category || '').trim() || UNCATEGORIZED) === cat).length})
                  </button>
                ))}
                <button
                  onClick={() => {
                    const name = window.prompt('새 부위 이름을 입력하세요 (예: 문, 샷시대창, 4쪽붙박이장)');
                    if (name && name.trim()) addSurface(name.trim());
                  }}
                  className="bg-blue-600 text-white text-sm px-3 py-1 rounded-full"
                >
                  + 새 부위
                </button>
              </div>
            )}

            {categoryOrder.map(cat => {
              const rows = surfaces
                .map((s, i) => ({ s, i }))
                .filter(({ s }) => ((s.category || '').trim() || UNCATEGORIZED) === cat);
              const collapsed = !!collapsedCats[cat];
              return (
                <div
                  key={cat}
                  ref={(el) => { categoryRefs.current[cat] = el; }}
                  className="border rounded mb-3 overflow-hidden"
                >
                  <div className="w-full bg-gray-100 px-3 py-2">
                    <div className="flex items-center justify-between">
                      <button
                        onClick={() => toggleCategoryCollapsed(cat)}
                        className="flex items-center gap-2 text-left font-medium flex-1"
                      >
                        <span>{cat} <span className="text-gray-500 text-sm font-normal">({rows.length}개)</span></span>
                        <span className="text-gray-500">{collapsed ? '▶' : '▼'}</span>
                      </button>
                      <div className="flex gap-1 ml-2">
                        <button
                          onClick={() => renameCategoryGroup(cat)}
                          className="text-xs bg-white border px-2 py-1 rounded hover:bg-gray-50"
                          title="부위 이름 변경"
                        >
                          이름변경
                        </button>
                        <button
                          onClick={() => duplicateCategory(cat)}
                          className="text-xs bg-white border px-2 py-1 rounded hover:bg-gray-50"
                          title="이 부위 전체를 복제"
                        >
                          복제
                        </button>
                        <button
                          onClick={() => saveGroupAsPreset(cat)}
                          className="text-xs bg-indigo-50 text-indigo-700 border border-indigo-300 px-2 py-1 rounded hover:bg-indigo-100"
                          title="이 부위 전체를 프리셋으로 저장"
                        >
                          프리셋 저장
                        </button>
                        <button
                          onClick={() => deleteCategoryGroup(cat)}
                          className="text-xs bg-red-50 text-red-600 border border-red-300 px-2 py-1 rounded hover:bg-red-100"
                          title="이 부위 전체 삭제"
                        >
                          통째삭제
                        </button>
                      </div>
                    </div>
                    <div className="flex items-center gap-1 mt-2 text-xs">
                      <span className="text-gray-500 mr-1">일괄 조정:</span>
                      <span className="text-gray-500">폭</span>
                      <button
                        onClick={() => adjustCategoryDimension(cat, 'width', -10)}
                        className="px-2 py-1 bg-white border rounded hover:bg-gray-50"
                        title="이 부위 전체 폭 -10mm"
                      >
                        -10
                      </button>
                      <button
                        onClick={() => adjustCategoryDimension(cat, 'width', 10)}
                        className="px-2 py-1 bg-white border rounded hover:bg-gray-50"
                        title="이 부위 전체 폭 +10mm"
                      >
                        +10
                      </button>
                      <span className="text-gray-500 ml-3">길이</span>
                      <button
                        onClick={() => adjustCategoryDimension(cat, 'height', -50)}
                        className="px-2 py-1 bg-white border rounded hover:bg-gray-50"
                        title="이 부위 전체 길이 -50mm"
                      >
                        -50
                      </button>
                      <button
                        onClick={() => adjustCategoryDimension(cat, 'height', 50)}
                        className="px-2 py-1 bg-white border rounded hover:bg-gray-50"
                        title="이 부위 전체 길이 +50mm"
                      >
                        +50
                      </button>
                    </div>
                  </div>
                  {!collapsed && (
                    <div className="p-3">
                      {rows.map(({ s: surface, i: index }) => (
                        <div key={index} className="flex flex-wrap items-center mb-2 gap-2">
                          <input
                            type="text" list="category-options"
                            placeholder="부위 (예: 문)" defaultValue={surface.category}
                            onBlur={(e) => handleInputBlur(index, 'category', e.target.value)}
                            className="border p-2 w-28"
                          />
                          <input
                            key={`w-${index}-${surface.width}`}
                            type="text" inputMode="numeric" pattern="[0-9]*"
                            placeholder="가로 (mm)" defaultValue={surface.width}
                            onBlur={(e) => handleInputBlur(index, 'width', e.target.value)}
                            className="border p-2 w-24"
                          />
                          <div className="flex gap-0.5">
                            <button
                              onClick={() => adjustSurfaceDimension(index, 'width', -10)}
                              className="text-xs bg-gray-200 px-1.5 py-2 rounded hover:bg-gray-300"
                              title="가로 -10mm"
                            >
                              -10
                            </button>
                            <button
                              onClick={() => adjustSurfaceDimension(index, 'width', 10)}
                              className="text-xs bg-gray-200 px-1.5 py-2 rounded hover:bg-gray-300"
                              title="가로 +10mm"
                            >
                              +10
                            </button>
                          </div>
                          <input
                            key={`h-${index}-${surface.height}`}
                            type="text" inputMode="numeric" pattern="[0-9]*"
                            placeholder="세로 (mm)" defaultValue={surface.height}
                            onBlur={(e) => handleInputBlur(index, 'height', e.target.value)}
                            className="border p-2 w-24"
                          />
                          <div className="flex gap-0.5">
                            <button
                              onClick={() => adjustSurfaceDimension(index, 'height', -50)}
                              className="text-xs bg-gray-200 px-1.5 py-2 rounded hover:bg-gray-300"
                              title="세로 -50mm"
                            >
                              -50
                            </button>
                            <button
                              onClick={() => adjustSurfaceDimension(index, 'height', 50)}
                              className="text-xs bg-gray-200 px-1.5 py-2 rounded hover:bg-gray-300"
                              title="세로 +50mm"
                            >
                              +50
                            </button>
                          </div>
                          <input
                            type="text" inputMode="numeric" pattern="[0-9]*"
                            placeholder="수량" defaultValue={surface.count}
                            onBlur={(e) => handleInputBlur(index, 'count', e.target.value)}
                            className="border p-2 w-20"
                          />
                          <input
                            type="text" placeholder="시공 위치 (예: 문1)" defaultValue={surface.label}
                            onBlur={(e) => handleInputBlur(index, 'label', e.target.value)}
                            className="border p-2 w-32"
                          />
                          <button
                            onClick={() => setSurfaces(surfaces.filter((_, i) => i !== index))}
                            className="bg-red-500 text-white p-2 rounded"
                          >
                            삭제
                          </button>
                        </div>
                      ))}
                      <button
                        onClick={() => addSurface(cat === UNCATEGORIZED ? '' : cat)}
                        className="bg-blue-400 text-white text-sm px-3 py-1.5 rounded"
                      >
                        + {cat}에 항목 추가
                      </button>
                    </div>
                  )}
                </div>
              );
            })}

            <button
              onClick={() => {
                const name = window.prompt('새 부위 이름을 입력하세요 (예: 문, 샷시대창, 4쪽붙박이장)');
                if (name && name.trim()) addSurface(name.trim());
              }}
              className="bg-blue-600 text-white text-sm px-3 py-2 rounded"
            >
              + 새 부위
            </button>
          </div>

          <button onClick={optimizeCutting} className="bg-green-500 text-white p-2 rounded mb-4">
            재단 최적화
          </button>
          <input type="file" accept=".json" onChange={loadResult} className="mb-4" />

          {result && (
            <div className="border p-4 mb-4">
              <h2 className="text-lg font-semibold">재단 결과</h2>
              <p>필요 롤 수: <strong>{result.rollCount}개</strong> ({(filmSize.length / 1000)}m 롤 기준)</p>
              <p>사용된 필름: {result.usedFilm.toFixed(3)} m²</p>
              <p>낭비율: {result.waste}%</p>
              <p>재단 조각: {result.layout.length}개</p>
              <div className="text-sm text-gray-600">
                {result.rollUsedLengths.map((len, i) => (
                  <span key={i} className="inline-block mr-3">
                    {i + 1}번 롤: {(len / 1000).toFixed(2)}m / {(filmSize.length / 1000)}m
                  </span>
                ))}
              </div>

              {result.unplacedCount > 0 && (
                <div className="mt-2 bg-yellow-100 border border-yellow-400 text-yellow-800 p-2 rounded">
                  ⚠️ 배치할 수 없는 조각이 {result.unplacedCount}개 있습니다. 필름 폭({filmSize.width}mm)보다
                  크거나, 필름 길이({(filmSize.length / 1000)}m)보다 긴 조각은 롤을 아무리 추가해도
                  배치할 수 없습니다. 조각 크기를 확인해주세요.
                </div>
              )}

              <button onClick={saveResult} className="bg-gray-500 text-white p-2 rounded mt-2">
                결과 저장
              </button>
              <button onClick={printPdf} className="bg-purple-600 text-white p-2 rounded mt-2 ml-2">
                PDF 인쇄
              </button>
              <button onClick={exportSummaryAsText} className="bg-emerald-600 text-white p-2 rounded mt-2 ml-2">
                텍스트로 내보내기
              </button>
              <button onClick={saveCuttingResultToStore} className="bg-teal-700 text-white p-2 rounded mt-2 ml-2">
                결과 저장소에 저장 (검색용)
              </button>
            </div>
          )}

          <div className="mb-4">
            <h2 className="text-lg font-semibold">재단 패턴 시각화</h2>
            <div className="mb-2">
              <button
                onClick={() => setFontSize(prev => Math.min(100, prev + 2))}
                className="bg-gray-500 text-white p-2 rounded mr-2"
              >
                폰트 크기 증가
              </button>
              <button
                onClick={() => setFontSize(prev => Math.max(10, prev - 2))}
                className="bg-gray-500 text-white p-2 rounded"
              >
                폰트 크기 감소
              </button>
            </div>
            {result && Array.from({ length: result.rollCount }, (_, i) => i + 1).map(rollNum => (
              <div key={rollNum} className="mb-4">
                <h3 className="font-medium mb-1">{rollNum}번 롤</h3>
                <div className="overflow-auto max-h-[600px] border">
                  <canvas ref={(el) => { canvasRefs.current[rollNum - 1] = el; }} className="w-full" />
                </div>
              </div>
            ))}
          </div>

          {result && (
            <div id="print-area">
              <h1 style={{ fontSize: '20px', fontWeight: 'bold', marginBottom: '4px' }}>재단 작업 지시서</h1>
              <p>현장명: {jobName || '미지정'}</p>
              <p>필름 규격: 폭 {filmSize.width}mm × 길이 {(filmSize.length / 1000)}m ({rotationAllowed ? '회전 배치 허용' : '회전 배치 미허용'})</p>
              <p>필요 롤 수: {result.rollCount}개 · 사용된 필름: {result.usedFilm.toFixed(3)} m² · 낭비율: {result.waste}% · 조각 수: {result.layout.length}개</p>
              <p>
                {result.rollUsedLengths.map((len, i) => `${i + 1}번 롤 ${(len / 1000).toFixed(2)}m`).join(' · ')}
              </p>
              {result.unplacedCount > 0 && (
                <p style={{ color: '#b45309' }}>⚠️ 배치할 수 없는 조각 {result.unplacedCount}개 있음 (아래 목록에서 제외됨)</p>
              )}

              <h2 style={{ fontSize: '15px', fontWeight: 'bold', marginTop: '14px', marginBottom: '4px' }}>부위별 소요 내역</h2>
              <table>
                <thead>
                  <tr>
                    <th>부위</th>
                    <th>위치(라벨)</th>
                    <th>가로(mm)</th>
                    <th>세로(mm)</th>
                    <th>수량</th>
                    <th>면적(㎡)</th>
                  </tr>
                </thead>
                <tbody>
                  {printSummary.map(group => (
                    <React.Fragment key={group.cat}>
                      {group.rows.map((r, i) => (
                        <tr key={`${group.cat}-${i}`}>
                          {i === 0 && <td rowSpan={group.rows.length + 1}>{group.cat}</td>}
                          <td>{r.label || '-'}</td>
                          <td>{r.width}</td>
                          <td>{r.height}</td>
                          <td>{r.count}</td>
                          <td>{r.areaM2.toFixed(3)}</td>
                        </tr>
                      ))}
                      <tr style={{ fontWeight: 'bold', background: '#f3f4f6' }}>
                        <td>소계</td>
                        <td>{group.subtotalCount}개</td>
                        <td colSpan={2}></td>
                        <td>{group.subtotalAreaM2.toFixed(3)}</td>
                      </tr>
                    </React.Fragment>
                  ))}
                  <tr style={{ fontWeight: 'bold', background: '#e5e7eb' }}>
                    <td colSpan={2}>총 소요량</td>
                    <td colSpan={2}></td>
                    <td>{totalRequiredCount}개</td>
                    <td>{totalRequiredAreaM2.toFixed(3)} ㎡</td>
                  </tr>
                </tbody>
              </table>
              <p style={{ fontSize: '10px', color: '#666', marginTop: '2px' }}>
                * 위 면적은 낭비율을 반영하지 않은 순수 필요 면적입니다. 실제 재단 시 사용되는 필름 면적은 위 "사용된 필름" 항목을 참고하세요.
              </p>

              <h2 style={{ fontSize: '15px', fontWeight: 'bold', marginTop: '14px', marginBottom: '4px' }}>재단 배치 목록</h2>
              <table>
                <thead>
                  <tr>
                    <th>번호</th>
                    <th>롤</th>
                    <th>위치(라벨)</th>
                    <th>가로(mm)</th>
                    <th>세로(mm)</th>
                    <th>회전</th>
                    <th>시작 X</th>
                    <th>시작 Y</th>
                  </tr>
                </thead>
                <tbody>
                  {result.layout.map(item => (
                    <tr key={item.id}>
                      <td>{item.id}</td>
                      <td>{item.roll}</td>
                      <td>{item.label || '-'}</td>
                      <td>{item.width}</td>
                      <td>{item.height}</td>
                      <td>{item.rotated ? 'O' : ''}</td>
                      <td>{item.x}</td>
                      <td>{item.y}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {printImageUrls.map((url, i) => (
                <div key={i}>
                  <h2 style={{ fontSize: '14px', fontWeight: 'bold', marginTop: '10px' }}>{i + 1}번 롤</h2>
                  <img src={url} alt={`${i + 1}번 롤 재단 패턴`} />
                </div>
              ))}
            </div>
          )}
        </div>
      );
    };

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, errorMessage: '' };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, errorMessage: (error && error.message) ? error.message : String(error) };
      }
      componentDidCatch(error, info) {
        console.error('앱 오류:', error, info);
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="p-6 max-w-lg mx-auto text-center">
              <h2 className="text-xl font-bold mb-2">문제가 발생했습니다</h2>
              <p className="text-sm text-gray-600 mb-1">
                데이터 형식 문제 등으로 화면 표시 중 오류가 발생했습니다.
              </p>
              <p className="text-xs text-gray-400 mb-4 break-words">오류 내용: {this.state.errorMessage}</p>
              <button
                onClick={() => window.location.reload()}
                className="bg-blue-600 text-white px-4 py-2 rounded"
              >
                새로고침
              </button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    ReactDOM.render(
      <ErrorBoundary><CuttingOptimizer /></ErrorBoundary>,
      document.getElementById('root')
    );
  </script>
</body>
</html>
